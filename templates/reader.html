<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{{ book.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #F7F2E8;
      --bg2:          #EDE7D9;
      --bg3:          #E2D9C9;
      --text:         #2B1D10;
      --text-h:       #1A0F06;
      --muted:        #7A6858;
      --border:       #D4C9B8;
      --accent:       #9B6A2F;
      --accent2:      #C8956C;
      --chapter-bg:   #2B1D10;
      --chapter-text: #F7F2E8;
      --tb-bg:        rgba(247,242,232,0.94);
      --fs: 19px;
    }
    .dark {
      --bg:           #1C1814;
      --bg2:          #252118;
      --bg3:          #2E2820;
      --text:         #E8DCC8;
      --text-h:       #F2EAD6;
      --muted:        #9A8C7A;
      --border:       #3A342C;
      --accent:       #C8956C;
      --accent2:      #E0AA80;
      --chapter-bg:   #0E0C0A;
      --chapter-text: #E8DCC8;
      --tb-bg:        rgba(28,24,20,0.94);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      font-size: var(--fs);
      transition: background .3s, color .3s;
    }

    /* ── Toolbar ──────────────────────────────────────── */
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 52px;
      display: flex; align-items: center; gap: 4px;
      padding: 0 8px 0 4px;
      background: var(--tb-bg);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      transition: opacity .35s, transform .35s, background .3s;
    }
    .toolbar.hidden { opacity: 0; transform: translateY(-100%); pointer-events: none; }

    .btn-icon {
      background: none; border: none; cursor: pointer;
      color: var(--muted);
      font-family: 'Inter', sans-serif; font-size: .78rem; font-weight: 600;
      padding: 5px 7px; border-radius: 7px;
      transition: background .15s, color .15s;
      flex-shrink: 0; white-space: nowrap;
    }
    .btn-icon:hover { background: var(--bg3); color: var(--text); }
    .btn-icon.active { color: var(--accent2); }
    .btn-back { font-size: 1.1rem; padding: 5px 6px; }

    .toolbar-center {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
    }
    .tb-book {
      font-family: 'Inter', sans-serif; font-size: .65rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tb-chapter {
      font-family: 'Lora', serif; font-size: .82rem; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .toolbar-right { display: flex; align-items: center; gap: 1px; flex-shrink: 0; }
    .tb-counter {
      font-family: 'Inter', sans-serif; font-size: .7rem; font-weight: 600;
      color: var(--muted); white-space: nowrap; padding: 0 5px;
    }

    /* ── Progress ─────────────────────────────────────── */
    .progress-bar {
      position: fixed; top: 52px; left: 0; right: 0;
      height: 2px; background: var(--border); z-index: 199;
    }
    .progress-fill {
      height: 100%; background: var(--accent2); width: 0%;
      transition: width .25s ease-out;
    }

    /* ── Card stack ───────────────────────────────────── */
    .card-stack {
      position: fixed; top: 54px; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }
    .card-slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); transition: background .3s;
      will-change: transform;
    }
    .card-inner {
      width: 100%; max-width: min(65ch, 92vw);
      max-height: 100%; padding: 20px 4px 44px;
      overflow-y: auto; scrollbar-width: none;
    }
    .card-inner::-webkit-scrollbar { display: none; }

    /* ── Card types ───────────────────────────────────── */
    .card-text .card-inner {
      line-height: 1.82; letter-spacing: .008em; word-spacing: .04em;
    }
    .card-text p { margin-bottom: 1.05em; hyphens: auto; -webkit-hyphens: auto; }
    .card-text p:last-child { margin-bottom: 0; }
    .card-text h5, .card-text h6 {
      font-family: 'Inter', sans-serif; font-size: .82em; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
      margin-bottom: .5em;
    }
    .card-text blockquote {
      border-left: 3px solid var(--accent2); padding-left: 1.1em;
      margin: .5em 0; color: var(--muted); font-style: italic;
    }
    .card-text ul, .card-text ol { padding-left: 1.4em; }
    .card-text li { margin-bottom: .3em; }
    .card-text em { font-style: italic; }
    .card-text strong { font-weight: 600; }

    .card-chapter { background: var(--chapter-bg) !important; }
    .card-chapter .card-inner {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 14px; min-height: 60dvh;
    }
    .ch-num {
      font-family: 'Inter', sans-serif; font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .18em; color: var(--accent2);
    }
    .card-chapter h1, .card-chapter h2 {
      font-size: clamp(1.45rem,5.5vw,2.1rem); font-weight: 600; line-height: 1.2;
      color: var(--chapter-text);
    }
    .ch-line { width: 36px; height: 2px; background: var(--accent2); border-radius: 2px; }

    .card-heading .card-inner {
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      min-height: 30dvh; justify-content: center;
    }
    .card-heading h3, .card-heading h4 {
      font-size: 1.15rem; font-weight: 600; line-height: 1.3; color: var(--text-h);
    }
    .heading-ornament { width: 28px; height: 2px; background: var(--accent2); border-radius: 2px; }

    .card-divider .card-inner {
      text-align: center; min-height: 20dvh;
      display: flex; align-items: center; justify-content: center;
    }
    .divider-mark {
      font-family: 'Lora', serif; font-size: 1.1rem;
      color: var(--muted); letter-spacing: .5em;
    }

    /* ── Desktop nav ─────────────────────────────────── */
    .nav-corner {
      position: fixed; bottom: max(20px,env(safe-area-inset-bottom,20px)); right: 14px;
      display: flex; flex-direction: column; gap: 6px; z-index: 300;
    }
    .nav-btn {
      width: 36px; height: 36px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 9px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; color: var(--muted);
      transition: background .15s, border-color .15s, color .15s;
    }
    .nav-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--accent2); }
    @media (pointer: coarse) { .nav-corner { display: none; } }

    /* ── Swipe hint ───────────────────────────────────── */
    .swipe-hint {
      position: fixed;
      bottom: max(16px,env(safe-area-inset-bottom,16px)); left: 50%;
      transform: translateX(-50%);
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 14px;
      font-family: 'Inter', sans-serif; font-size: .7rem; color: var(--muted);
      z-index: 300; white-space: nowrap; pointer-events: none;
      transition: opacity .5s;
    }
    .swipe-hint.gone { opacity: 0; }

    /* ── Toast ───────────────────────────────────────── */
    .toast {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 5px 14px;
      font-family: 'Inter', sans-serif; font-size: .78rem; color: var(--text);
      z-index: 400; white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity .25s;
    }
    .toast.show { opacity: 1; }

    /* ── TTS bottom bar ──────────────────────────────── */
    .tts-bar {
      position: fixed; left: 0; right: 0; z-index: 180;
      bottom: calc(-68px - env(safe-area-inset-bottom, 0px));
      height: calc(60px + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: var(--bg2); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding-left: 12px; padding-right: 12px;
      transition: bottom .3s cubic-bezier(.4,0,.2,1), background .3s;
    }
    .tts-bar.visible {
      bottom: 0;
    }
    /* When translation drawer is also open, TTS bar stays put and drawer sits above it */

    .tts-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; padding: 6px 8px; border-radius: 8px;
      color: var(--text); transition: background .15s;
    }
    .tts-btn:hover { background: var(--bg3); }
    .tts-btn.main { font-size: 1.5rem; }

    .tts-speed {
      font-family: 'Inter', sans-serif; font-size: .75rem; font-weight: 600;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 4px 6px; cursor: pointer;
      transition: background .15s;
    }
    .tts-speed:hover { background: var(--border); }

    .tts-lang-sel {
      font-family: 'Inter', sans-serif; font-size: .72rem; font-weight: 600;
      background: var(--bg3); border: 1px solid var(--accent2);
      border-radius: 6px; color: var(--accent2); padding: 3px 5px; cursor: pointer;
      flex-shrink: 0; max-width: 72px;
    }

    /* ── Translation drawer ───────────────────────────── */
    .translate-drawer {
      position: fixed; left: 0; right: 0; z-index: 170;
      bottom: -60dvh; /* hidden */
      max-height: 60dvh;
      background: var(--bg2); border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      display: flex; flex-direction: column;
      transition: bottom .38s cubic-bezier(.4,0,.2,1), background .3s;
    }
    .translate-drawer.open { bottom: 0; }
    /* Shift up when TTS bar is also visible */
    .translate-drawer.open.tts-up {
      bottom: calc(60px + env(safe-area-inset-bottom, 0px));
    }

    .drawer-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 10px auto 0; flex-shrink: 0;
    }
    .drawer-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px 8px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-lang-row {
      flex: 1; display: flex; align-items: center; gap: 6px; min-width: 0;
    }
    .drawer-from {
      font-family: 'Inter', sans-serif; font-size: .72rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .06em;
      white-space: nowrap;
    }
    .drawer-arrow { color: var(--accent2); font-size: .9rem; flex-shrink: 0; }

    .lang-select {
      font-family: 'Inter', sans-serif; font-size: .72rem; font-weight: 600;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 3px 6px; cursor: pointer;
      transition: background .15s;
    }
    .lang-select:hover { background: var(--border); }

    .btn-close-drawer {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1rem; padding: 4px 6px;
      border-radius: 6px; flex-shrink: 0;
      transition: background .15s, color .15s;
    }
    .btn-close-drawer:hover { background: var(--bg3); color: var(--text); }

    .drawer-body {
      overflow-y: auto; padding: 16px; flex: 1;
      font-family: 'Lora', serif; font-size: 1rem; line-height: 1.75;
      color: var(--text);
    }
    .drawer-body::-webkit-scrollbar { width: 4px; }
    .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .translation-status {
      display: flex; align-items: center; gap: 8px;
      color: var(--muted); font-family: 'Inter', sans-serif; font-size: .85rem;
    }
    .spinner-sm {
      width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--accent2);
      border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Backdrop */
    .drawer-backdrop {
      display: none; position: fixed; inset: 0; z-index: 160;
      background: transparent;
    }
    .drawer-backdrop.show { display: block; }

    /* Karaoke word highlight */
    .tts-w { display: inline; }
    .tts-active {
      background: rgba(200,149,108,.32);
      color: var(--text-h);
      border-radius: 3px;
      outline: 1px solid rgba(200,149,108,.18);
      transition: background .08s;
    }
  </style>
</head>
<body>

<!-- ── Toolbar ─────────────────────────────────────────── -->
<nav class="toolbar" id="toolbar">
  <a href="/" class="btn-icon btn-back" title="Início">←</a>
  <div class="toolbar-center">
    <div class="tb-book" id="tb-book">{{ book.title }}</div>
    <div class="tb-chapter" id="tb-chapter"></div>
  </div>
  <div class="toolbar-right">
    <div class="tb-counter" id="tb-counter"></div>
    <button class="btn-icon" id="btn-tts"  title="Ler em voz alta">🔊</button>
    <button class="btn-icon" id="btn-xlat" title="Traduzir card">🌐</button>
    <button class="btn-icon" id="btn-fs-down" title="Fonte menor">A−</button>
    <button class="btn-icon" id="btn-fs-up"   title="Fonte maior">A+</button>
    <button class="btn-icon" id="btn-dark">☽</button>
  </div>
</nav>

<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<!-- ── Card stack ──────────────────────────────────────── -->
<div class="card-stack">
  <div class="card-slide" id="card-a"></div>
  <div class="card-slide" id="card-b" style="transform:translateY(100%)"></div>
</div>

<!-- ── Desktop nav ─────────────────────────────────────── -->
<div class="nav-corner">
  <button class="nav-btn" id="btn-prev">↑</button>
  <button class="nav-btn" id="btn-next">↓</button>
</div>

<!-- ── Swipe hint ──────────────────────────────────────── -->
<div class="swipe-hint" id="swipe-hint">↑ deslize para avançar</div>
<div class="toast" id="toast"></div>

<!-- ── TTS bar ─────────────────────────────────────────── -->
<div class="tts-bar" id="tts-bar">
  <select class="tts-lang-sel" id="tts-lang-sel" title="Idioma da leitura em voz alta">
    <option value="pt-BR">PT</option>
    <option value="en-US">EN</option>
    <option value="es-ES">ES</option>
    <option value="fr-FR">FR</option>
    <option value="de-DE">DE</option>
    <option value="it-IT">IT</option>
    <option value="ja-JP">JA</option>
    <option value="zh-CN">ZH</option>
    <option value="ru-RU">RU</option>
  </select>
  <button class="tts-btn" id="tts-prev"  title="Card anterior">⏮</button>
  <button class="tts-btn main" id="tts-play" title="Reproduzir / Pausar">▶</button>
  <button class="tts-btn" id="tts-next"  title="Próximo card">⏭</button>
  <select class="tts-speed" id="tts-speed" title="Velocidade">
    <option value="0.75">0.75×</option>
    <option value="1" selected>1×</option>
    <option value="1.25">1.25×</option>
    <option value="1.5">1.5×</option>
    <option value="2">2×</option>
  </select>
  <button class="tts-btn" id="tts-stop" title="Parar">✕</button>
</div>

<!-- ── Translation drawer ──────────────────────────────── -->
<div class="drawer-backdrop" id="drawer-backdrop"></div>
<div class="translate-drawer" id="translate-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-lang-row">
      <span class="drawer-from" id="drawer-from">—</span>
      <span class="drawer-arrow">→</span>
      <select class="lang-select" id="target-lang">
        <option value="pt">Português</option>
        <option value="en">Inglês</option>
        <option value="es">Espanhol</option>
        <option value="fr">Francês</option>
        <option value="de">Alemão</option>
        <option value="it">Italiano</option>
        <option value="ja">Japonês</option>
        <option value="zh-CN">Chinês</option>
        <option value="ru">Russo</option>
      </select>
    </div>
    <button class="btn-close-drawer" id="btn-close-drawer">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
(function () {
  // ── Data ────────────────────────────────────────────────────────
  const SECTIONS    = {{ book.sections | tojson }};
  const BOOK_ID     = {{ book.id | tojson }};
  const BOOK_TITLE  = {{ book.title | tojson }};
  const BOOK_LANG   = {{ (book.lang.iso if book.lang else 'unknown') | tojson }};
  const BOOK_BCP47  = {{ (book.lang.bcp47 if book.lang else 'unknown') | tojson }};
  const COOKIE_KEY  = 'card_' + BOOK_ID;
  const YEAR_MS     = 365 * 24 * 60 * 60 * 1000;

  const LANG_NAMES  = {
    pt:'Português', en:'Inglês', es:'Espanhol', fr:'Francês', de:'Alemão',
    it:'Italiano', ja:'Japonês', zh:'Chinês', ru:'Russo', ar:'Árabe',
    ko:'Coreano', nl:'Holandês', pl:'Polonês', tr:'Turco',
  };

  // ── Helpers ──────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const setCookie = (k,v,ms) =>
    (document.cookie=`${k}=${encodeURIComponent(v)};expires=${new Date(Date.now()+ms).toUTCString()};path=/;SameSite=Lax`);
  const getCookie = k => {
    const m = document.cookie.match(new RegExp('(?:^|; )'+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : null;
  };

  // ── Theme ────────────────────────────────────────────────────────
  const html  = document.documentElement;
  let dark = localStorage.getItem('readerDark')==='1'
    || (localStorage.getItem('readerDark')===null && matchMedia('(prefers-color-scheme:dark)').matches);
  const applyTheme = () => {
    html.classList.toggle('dark', dark);
    $('btn-dark').textContent = dark ? '☀' : '☽';
    localStorage.setItem('readerDark', dark?'1':'0');
  };
  applyTheme();
  $('btn-dark').addEventListener('click', () => { dark=!dark; applyTheme(); });

  // ── Font size ─────────────────────────────────────────────────────
  let fs = parseInt(localStorage.getItem('readerFs')||'19', 10);
  let toastTimer;
  const showToast = msg => {
    $('toast').textContent = msg;
    $('toast').classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>$('toast').classList.remove('show'), 1400);
  };
  html.style.setProperty('--fs', fs+'px');
  $('btn-fs-up').addEventListener('click',   () => { if(fs<28){fs++;html.style.setProperty('--fs',fs+'px');localStorage.setItem('readerFs',fs);showToast(`Fonte: ${fs}px`);} });
  $('btn-fs-down').addEventListener('click', () => { if(fs>14){fs--;html.style.setProperty('--fs',fs+'px');localStorage.setItem('readerFs',fs);showToast(`Fonte: ${fs}px`);} });

  // ── Card building ──────────────────────────────────────────────────
  function splitBySentence(text, maxLen) {
    const pieces = text.match(/[^.!?…]+[.!?…]+["»]?\s*/g) || [text];
    const chunks = []; let cur = '';
    for (const s of pieces) {
      if (cur && cur.length+s.length > maxLen) { chunks.push(cur.trimEnd()); cur=s; }
      else cur += s;
    }
    if (cur.trim()) chunks.push(cur.trim());
    return chunks.length ? chunks : [text];
  }

  function buildCards() {
    const cards = [];
    let chapterTitle = '', chapterCount = 0;

    for (const section of SECTIONS) {
      if (!section.html) continue;
      const doc  = new DOMParser().parseFromString(section.html, 'text/html');
      const body = doc.body;
      const SELS = 'p,h1,h2,h3,h4,h5,h6,blockquote,hr,ul,ol,figure';

      let nodes = Array.from(body.querySelectorAll(SELS));
      nodes = nodes.filter(n => {
        let p = n.parentElement;
        while (p && p!==body) { if (nodes.includes(p)) return false; p=p.parentElement; }
        return true;
      });

      if (!nodes.length) {
        const text = body.textContent.trim();
        if (!text) continue;
        for (const chunk of splitBySentence(text, 580))
          cards.push({ type:'text', html:`<p>${chunk}</p>`, chapter:chapterTitle });
        continue;
      }

      let buf=[], bufLen=0;
      const LIMIT=580, DIAL=110;
      const flush = () => {
        if (buf.length) cards.push({ type:'text', html:buf.join(''), chapter:chapterTitle });
        buf=[]; bufLen=0;
      };

      for (const node of nodes) {
        const tag=node.tagName, text=node.textContent.trim();
        if (!text && tag!=='HR') continue;

        if (tag==='HR') { flush(); cards.push({type:'divider',chapter:chapterTitle}); continue; }

        if (tag==='H1'||tag==='H2') {
          flush(); chapterTitle=text; chapterCount++;
          cards.push({type:'chapter',html:node.outerHTML,chapter:text,num:chapterCount}); continue;
        }
        if (tag==='H3'||tag==='H4') {
          flush(); cards.push({type:'heading',html:node.outerHTML,chapter:chapterTitle}); continue;
        }
        if (tag==='H5'||tag==='H6') {
          if (bufLen+text.length>LIMIT && buf.length) flush();
          buf.push(node.outerHTML); bufLen+=text.length; continue;
        }
        if (text.length>700) {
          flush();
          for (const chunk of splitBySentence(text, 560))
            cards.push({type:'text',html:`<p>${chunk}</p>`,chapter:chapterTitle});
          continue;
        }
        if (text.length<=DIAL) {
          if (bufLen+text.length>LIMIT && buf.length) flush();
          buf.push(node.outerHTML); bufLen+=text.length; continue;
        }
        if (bufLen+text.length>LIMIT && buf.length) flush();
        buf.push(node.outerHTML); bufLen+=text.length;
        if (bufLen>=LIMIT) flush();
      }
      flush();
    }
    return cards;
  }

  const CARDS = buildCards();
  const TOTAL = CARDS.length;

  // Plain-text extraction per card (for TTS)
  function cardText(idx) {
    const tmp = document.createElement('div');
    tmp.innerHTML = CARDS[idx].html || '';
    return tmp.textContent.trim();
  }

  // ── Render cards ─────────────────────────────────────────────────
  function renderCard(el, card) {
    el.innerHTML = '';
    el.className = 'card-slide';
    const inner = document.createElement('div');
    inner.className = 'card-inner';
    if (card.type==='chapter') {
      el.classList.add('card-chapter');
      inner.innerHTML = `<div class="ch-num">Capítulo ${card.num}</div>${card.html}<div class="ch-line"></div>`;
    } else if (card.type==='heading') {
      el.classList.add('card-heading');
      inner.innerHTML = `${card.html}<div class="heading-ornament"></div>`;
    } else if (card.type==='divider') {
      el.classList.add('card-divider');
      inner.innerHTML = '<div class="divider-mark">* &thinsp; * &thinsp; *</div>';
    } else {
      el.classList.add('card-text');
      inner.innerHTML = card.html;
    }
    el.appendChild(inner);
  }

  function updateUI(idx) {
    const card = CARDS[idx];
    const pct  = TOTAL>1 ? (idx/(TOTAL-1))*100 : 100;
    $('progress-fill').style.width = pct+'%';
    $('tb-counter').textContent    = `${idx+1} / ${TOTAL}`;
    $('tb-chapter').textContent    = card.chapter||'';
    $('tb-book').textContent       = BOOK_TITLE;
  }

  // ── Navigation ────────────────────────────────────────────────────
  let front=  $('card-a'), back=$('card-b');
  let current=0, busy=false;
  const DUR=320;

  function goTo(idx, dir) {
    if (busy||idx<0||idx>=TOTAL||idx===current) return;
    busy=true;
    setCookie(COOKIE_KEY, idx, YEAR_MS);

    renderCard(back, CARDS[idx]);
    back.style.transition='none';
    back.style.transform = dir>0 ? 'translateY(100%)' : 'translateY(-100%)';
    back.getBoundingClientRect();

    const ease = `transform ${DUR}ms cubic-bezier(0.4,0,0.2,1)`;
    front.style.transition=ease; back.style.transition=ease;
    front.style.transform = dir>0 ? 'translateY(-100%)' : 'translateY(100%)';
    back.style.transform  = 'translateY(0)';

    setTimeout(() => {
      front.style.transition='none';
      front.style.transform  = dir>0 ? 'translateY(100%)' : 'translateY(-100%)';
      [front,back]=[back,front];
      current=idx;
      updateUI(current);
      busy=false;

      // Continue TTS on new card if active
      if (ttsActive) {
        synth.cancel();
        setTimeout(ttsSpeak, 60);
      }
      // Auto-retranslate if drawer is open
      if (drawerOpen) translateCard(current, false);
    }, DUR);
  }

  const next=()=>goTo(current+1, 1);
  const prev=()=>goTo(current-1,-1);

  // ── Init ──────────────────────────────────────────────────────────
  const saved    = parseInt(getCookie(COOKIE_KEY)||'0', 10);
  const startIdx = (saved>=0&&saved<TOTAL) ? saved : 0;
  front.style.transform='translateY(0)';
  renderCard(front, CARDS[startIdx]);
  current=startIdx;
  updateUI(current);

  $('btn-next').addEventListener('click', next);
  $('btn-prev').addEventListener('click', prev);

  // ── Keyboard ──────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
    switch(e.code) {
      case 'Space':      e.preventDefault(); e.shiftKey?prev():next(); break;
      case 'ArrowRight': case 'ArrowDown': case 'PageDown':
        e.preventDefault(); next(); break;
      case 'ArrowLeft': case 'ArrowUp': case 'PageUp': case 'Backspace':
        e.preventDefault(); prev(); break;
    }
  });

  // ── Swipe ─────────────────────────────────────────────────────────
  let tY0=0, tX0=0;
  const hint=$('swipe-hint'); let hintGone=false;
  const dismissHint=()=>{ if(!hintGone){hintGone=true;hint.classList.add('gone');} };
  document.addEventListener('touchstart',e=>{tY0=e.changedTouches[0].clientY;tX0=e.changedTouches[0].clientX;},{passive:true});
  document.addEventListener('touchend',e=>{
    const dy=tY0-e.changedTouches[0].clientY, dx=Math.abs(tX0-e.changedTouches[0].clientX);
    if (Math.abs(dy)>50 && Math.abs(dy)>dx*1.4) { dy>0?next():prev(); dismissHint(); }
  },{passive:true});
  setTimeout(dismissHint,4500);

  // ── Toolbar auto-hide ─────────────────────────────────────────────
  const toolbar=$('toolbar'); let tbTimer;
  const showToolbar=()=>{ toolbar.classList.remove('hidden'); clearTimeout(tbTimer); tbTimer=setTimeout(()=>toolbar.classList.add('hidden'),3500); };
  showToolbar();
  document.addEventListener('touchstart', showToolbar,{passive:true});
  document.addEventListener('mousemove',  showToolbar,{passive:true});
  document.addEventListener('keydown',    showToolbar);

  // ── Recent books ──────────────────────────────────────────────────
  try {
    let r=JSON.parse(localStorage.getItem('recentBooks')||'[]');
    r=r.filter(b=>b.id!==BOOK_ID);
    r.unshift({id:BOOK_ID,title:BOOK_TITLE});
    localStorage.setItem('recentBooks',JSON.stringify(r.slice(0,10)));
  } catch {}

  // ════════════════════════════════════════════════════════════════
  // TTS — Web Speech API (built into the browser, free, zero weight)
  // ════════════════════════════════════════════════════════════════
  const synth = window.speechSynthesis;
  let ttsActive=false, ttsPaused=false, ttsRate=1;

  // ISO 639-1 → BCP-47 for TTS and translation target languages
  const ISO_TO_BCP47 = {
    'pt':'pt-BR','en':'en-US','es':'es-ES','fr':'fr-FR','de':'de-DE',
    'it':'it-IT','ja':'ja-JP','zh':'zh-CN','zh-cn':'zh-CN',
    'ru':'ru-RU','ar':'ar-SA','ko':'ko-KR','nl':'nl-NL','tr':'tr-TR',
  };

  // Voice cache — getVoices() is async on most browsers; populate eagerly and on change
  let _voices = [];
  function loadVoices() { _voices = synth.getVoices(); }
  loadVoices();
  synth.onvoiceschanged = loadVoices;

  function pickVoice(bcp47) {
    if (!_voices.length) loadVoices();
    const lower = bcp47.toLowerCase();
    const base  = lower.split('-')[0];
    // Prefer exact match, then same base language, then any voice
    return (
      _voices.find(v => v.lang.toLowerCase() === lower) ||
      _voices.find(v => v.lang.toLowerCase().startsWith(base)) ||
      null
    );
  }

  // Resolve which text + language TTS should use right now.
  function ttsContext() {
    const to       = $('target-lang').value;
    const cacheKey = `${current}_${to}`;
    if (drawerOpen && cache[cacheKey]) {
      const lang = ISO_TO_BCP47[to] || ISO_TO_BCP47[to.split('-')[0]] || to;
      return { text: cache[cacheKey], lang, container: $('drawer-body') };
    }
    return {
      text: cardText(current),
      lang: $('tts-lang-sel').value,
      container: front.querySelector('.card-inner'),
    };
  }

  // ── Karaoke word wrapping ────────────────────────────────────────
  let wordSpans = [];   // DOM spans in current TTS target
  let activeSpan = null;

  function wrapWords(container) {
    wordSpans = [];
    let offset = 0;

    function walk(node) {
      if (node.nodeType === 3) {           // TEXT_NODE
        const t = node.textContent;
        const tokens = t.split(/(\s+)/);
        const frag = document.createDocumentFragment();
        for (const tok of tokens) {
          if (!tok) continue;
          if (/\S/.test(tok)) {
            const sp = document.createElement('span');
            sp.className = 'tts-w';
            sp._s = offset;              // char start in plain text
            sp._e = offset + tok.length; // char end
            sp.textContent = tok;
            wordSpans.push(sp);
            frag.appendChild(sp);
          } else {
            frag.appendChild(document.createTextNode(tok));
          }
          offset += tok.length;
        }
        node.parentNode.replaceChild(frag, node);
      } else if (node.nodeType === 1) {
        Array.from(node.childNodes).forEach(walk);
      }
    }

    Array.from(container.childNodes).forEach(walk);
  }

  function unwrapWords() {
    for (const sp of wordSpans) {
      if (sp.parentNode) sp.replaceWith(sp.textContent);
    }
    // Normalize adjacent text nodes left behind
    if (activeSpan && activeSpan.parentNode)
      activeSpan.parentNode.normalize();
    wordSpans = [];
    activeSpan = null;
  }

  function highlightWord(charIndex) {
    if (activeSpan) activeSpan.classList.remove('tts-active');
    // Find span that contains charIndex
    let found = null;
    for (const sp of wordSpans) {
      if (sp._s <= charIndex && sp._e > charIndex) { found = sp; break; }
    }
    // Fallback: nearest span starting after charIndex
    if (!found) {
      for (const sp of wordSpans) {
        if (sp._s >= charIndex) { found = sp; break; }
      }
    }
    if (found) {
      found.classList.add('tts-active');
      activeSpan = found;
      found.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  function ttsSpeak() {
    const { text, lang, container } = ttsContext();
    if (!text.trim()) { if (ttsActive) { next(); } return; }

    // Wrap words for karaoke highlight
    unwrapWords();
    if (container) wrapWords(container);

    const utt = new SpeechSynthesisUtterance(text);
    utt.lang  = lang;
    utt.rate  = ttsRate;

    const voice = pickVoice(lang);
    if (voice) utt.voice = voice;

    utt.onboundary = e => {
      if (e.name === 'word') highlightWord(e.charIndex);
    };

    utt.onend = () => {
      if (!ttsActive) return;
      unwrapWords();
      if (current < TOTAL-1) { next(); }
      else                   { ttsStop(); }
    };
    utt.onerror = e => {
      unwrapWords();
      if (e.error !== 'interrupted') ttsStop();
    };

    synth.cancel();
    synth.speak(utt);
    updateTtsBtn();
  }

  function ttsToggle() {
    if (!ttsActive) {
      ttsActive=true; ttsPaused=false;
      $('tts-bar').classList.add('visible');
      $('btn-tts').classList.add('active');
      ttsSpeak();
    } else if (synth.paused) {
      synth.resume(); ttsPaused=false; updateTtsBtn();
    } else {
      synth.pause(); ttsPaused=true; updateTtsBtn();
    }
  }

  function ttsStop() {
    synth.cancel();
    unwrapWords();
    ttsActive=false; ttsPaused=false;
    $('tts-bar').classList.remove('visible');
    $('btn-tts').classList.remove('active');
    $('btn-tts').textContent='🔊';
    $('tts-play').textContent='▶';
  }

  function updateTtsBtn() {
    const playing = ttsActive && !ttsPaused;
    $('btn-tts').textContent  = playing ? '⏸' : (ttsActive ? '▶' : '🔊');
    $('tts-play').textContent = playing ? '⏸' : '▶';
  }

  // Pre-select detected book language in TTS language picker
  const detectedBcp47 = BOOK_BCP47 !== 'unknown'
    ? BOOK_BCP47
    : (ISO_TO_BCP47[navigator.language.split('-')[0]] || 'pt-BR');
  $('tts-lang-sel').value = detectedBcp47;
  // If detected value isn't in the option list, fall back to pt-BR
  if (!$('tts-lang-sel').value) $('tts-lang-sel').value = 'pt-BR';

  $('btn-tts').addEventListener('click', ttsToggle);
  $('tts-play').addEventListener('click', ttsToggle);
  $('tts-stop').addEventListener('click', ttsStop);
  $('tts-prev').addEventListener('click', ()=>{ synth.cancel(); prev(); });
  $('tts-next').addEventListener('click', ()=>{ synth.cancel(); next(); });

  $('tts-speed').addEventListener('change', e => {
    ttsRate=parseFloat(e.target.value);
    if (ttsActive && !ttsPaused) {
      // Restart utterance with new rate
      synth.cancel();
      setTimeout(ttsSpeak, 60);
    }
  });

  // onvoiceschanged already wired above in the voice-cache section

  // ════════════════════════════════════════════════════════════════
  // TRANSLATION — Google Translate unofficial endpoint (free, no key)
  // Fallback: MyMemory public API
  // ════════════════════════════════════════════════════════════════
  const cache = {};         // {cardIdx_targetLang: translatedText}
  let drawerOpen = false;

  // Default target: opposite of book language
  const defaultTarget = BOOK_LANG==='pt' ? 'en' : 'pt';
  $('target-lang').value = defaultTarget;

  // "Detectado: Inglês" label
  $('drawer-from').textContent = langName || 'Detectado';

  async function fetchTranslation(text, from, to) {
    // Primary: Google Translate (unofficial, used by many open-source tools)
    try {
      const url = new URL('https://translate.googleapis.com/translate_a/single');
      url.searchParams.set('client', 'gtx');
      url.searchParams.set('sl', from==='unknown' ? 'auto' : from);
      url.searchParams.set('tl', to);
      url.searchParams.set('dt', 't');
      url.searchParams.set('q',  text);

      const res  = await fetch(url, {signal: AbortSignal.timeout(8000)});
      const data = await res.json();
      // Response: [[["translated","original",...], ...], ...]
      return data[0].map(chunk => chunk[0]||'').join('');
    } catch {}

    // Fallback: MyMemory (5 000 chars/day free, no key)
    try {
      const src = from==='unknown' ? 'autodetect' : from;
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${to}`;
      const res  = await fetch(url, {signal: AbortSignal.timeout(8000)});
      const data = await res.json();
      if (data.responseStatus===200) return data.responseData.translatedText;
    } catch {}

    throw new Error('Tradução indisponível. Verifique sua conexão.');
  }

  async function translateCard(idx, scrollTop=true) {
    const to      = $('target-lang').value;
    const cacheKey= `${idx}_${to}`;
    const text    = cardText(idx);
    if (!text) { showDrawerContent('<em>Sem texto para traduzir neste card.</em>'); return; }

    if (cache[cacheKey]) { showDrawerContent(cache[cacheKey]); return; }

    showDrawerContent('<div class="translation-status"><div class="spinner-sm"></div>Traduzindo…</div>');

    try {
      const from = BOOK_LANG==='unknown' ? 'auto' : BOOK_LANG;
      const result = await fetchTranslation(text, from, to);
      cache[cacheKey] = result;
      showDrawerContent(result);
      // If TTS is running while drawer just got the translation, switch to reading it
      if (ttsActive) { synth.cancel(); setTimeout(ttsSpeak, 60); }
    } catch(e) {
      showDrawerContent(`<em style="color:var(--muted)">${e.message}</em>`);
    }
    if (scrollTop) $('drawer-body').scrollTop=0;
  }

  function showDrawerContent(html) {
    $('drawer-body').innerHTML = html;
  }

  function openDrawer() {
    drawerOpen=true;
    const drawer=$('translate-drawer'), backdrop=$('drawer-backdrop');
    drawer.classList.add('open');
    backdrop.classList.add('show');
    if ($('tts-bar').classList.contains('visible'))
      drawer.classList.add('tts-up');
    translateCard(current);
  }

  function closeDrawer() {
    drawerOpen=false;
    $('translate-drawer').classList.remove('open','tts-up');
    $('drawer-backdrop').classList.remove('show');
  }

  $('btn-xlat').addEventListener('click', () => drawerOpen ? closeDrawer() : openDrawer());
  $('btn-close-drawer').addEventListener('click', closeDrawer);

  // Re-translate when target language changes
  $('target-lang').addEventListener('change', () => {
    if (drawerOpen) translateCard(current);
  });

  // Keep drawer above TTS bar when TTS toggles
  const ttsBar=$('tts-bar');
  const observer=new MutationObserver(()=>{
    if(drawerOpen) {
      $('translate-drawer').classList.toggle('tts-up', ttsBar.classList.contains('visible'));
    }
  });
  observer.observe(ttsBar,{attributes:true,attributeFilter:['class']});

})();
</script>
</body>
</html>
