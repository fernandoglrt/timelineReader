<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{{ book.title }} — f9</title>
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" content="#F7F2E8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1C1814" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #F7F2E8;
      --bg2:          #EDE7D9;
      --bg3:          #E2D9C9;
      --text:         #2B1D10;
      --text-h:       #1A0F06;
      --muted:        #7A6858;
      --border:       #D4C9B8;
      --accent:       #9B6A2F;
      --accent2:      #C8956C;
      --chapter-bg:   #2B1D10;
      --chapter-text: #F7F2E8;
      --tb-bg:        rgba(247,242,232,0.94);
      --fs: 19px;
    }
    .dark {
      --bg:           #1C1814;
      --bg2:          #252118;
      --bg3:          #2E2820;
      --text:         #E8DCC8;
      --text-h:       #F2EAD6;
      --muted:        #9A8C7A;
      --border:       #3A342C;
      --accent:       #C8956C;
      --accent2:      #E0AA80;
      --chapter-bg:   #0E0C0A;
      --chapter-text: #E8DCC8;
      --tb-bg:        rgba(28,24,20,0.94);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      font-size: var(--fs);
      transition: background .3s, color .3s;
    }

    /* ── Toolbar ──────────────────────────────────────── */
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 52px;
      display: flex; align-items: center; gap: 4px;
      padding: 0 8px 0 4px;
      background: var(--tb-bg);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      transition: opacity .35s, transform .35s, background .3s;
    }
    .toolbar.hidden { opacity: 0; transform: translateY(-100%); pointer-events: none; }

    .btn-icon {
      background: none; border: none; cursor: pointer;
      color: var(--muted);
      font-family: 'Inter', sans-serif; font-size: .78rem; font-weight: 600;
      padding: 5px 7px; border-radius: 7px;
      transition: background .15s, color .15s;
      flex-shrink: 0; white-space: nowrap;
    }
    .btn-icon:hover { background: var(--bg3); color: var(--text); }
    .btn-icon.active { color: var(--accent2); }
    .btn-back { font-size: 1.1rem; padding: 5px 6px; }

    .toolbar-center {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
    }
    .tb-book {
      font-family: 'Inter', sans-serif; font-size: .65rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tb-chapter {
      font-family: 'Lora', serif; font-size: .82rem; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .toolbar-right { display: flex; align-items: center; gap: 1px; flex-shrink: 0; }
    .tb-counter {
      font-family: 'Inter', sans-serif; font-size: .7rem; font-weight: 600;
      color: var(--muted); white-space: nowrap; padding: 0 5px;
    }
    .tb-counter.two-line {
      white-space: normal; text-align: right; line-height: 1.3;
    }

    /* ── Progress ─────────────────────────────────────── */
    .progress-bar {
      position: fixed; top: 52px; left: 0; right: 0;
      height: 2px; background: var(--border); z-index: 199;
    }
    .progress-fill {
      height: 100%; background: var(--accent2); width: 0%;
      transition: width .25s ease-out;
    }

    /* ── Card stack ───────────────────────────────────── */
    .card-stack {
      position: fixed; top: 54px; left: 0; right: 0;
      bottom: calc(56px + env(safe-area-inset-bottom, 0px));
      overflow: hidden;
    }
    .card-slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); transition: background .3s;
      will-change: transform;
    }
    .card-inner {
      width: 100%; max-width: min(65ch, 92vw);
      max-height: 100%; padding: 20px 4px 44px;
      overflow-y: auto; scrollbar-width: none;
    }
    .card-inner::-webkit-scrollbar { display: none; }

    /* ── Card types ───────────────────────────────────── */
    .card-text .card-inner {
      line-height: 1.82; letter-spacing: .008em; word-spacing: .04em;
    }
    .card-text p { margin-bottom: 1.05em; hyphens: auto; -webkit-hyphens: auto; }
    .card-text p:last-child { margin-bottom: 0; }
    .card-text h5, .card-text h6 {
      font-family: 'Inter', sans-serif; font-size: .82em; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
      margin-bottom: .5em;
    }
    .card-text blockquote {
      border-left: 3px solid var(--accent2); padding-left: 1.1em;
      margin: .5em 0; color: var(--muted); font-style: italic;
    }
    .card-text ul, .card-text ol { padding-left: 1.4em; }
    .card-text li { margin-bottom: .3em; }
    .card-text em { font-style: italic; }
    .card-text strong { font-weight: 600; }

    .card-chapter { background: var(--chapter-bg) !important; }
    .card-chapter .card-inner {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 14px; min-height: 60dvh;
    }
    .ch-num {
      font-family: 'Inter', sans-serif; font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .18em; color: var(--accent2);
    }
    .card-chapter h1, .card-chapter h2 {
      font-size: clamp(1.45rem,5.5vw,2.1rem); font-weight: 600; line-height: 1.2;
      color: var(--chapter-text);
    }
    .ch-line { width: 36px; height: 2px; background: var(--accent2); border-radius: 2px; }

    .card-heading .card-inner {
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      min-height: 30dvh; justify-content: center;
    }
    .card-heading h3, .card-heading h4 {
      font-size: 1.15rem; font-weight: 600; line-height: 1.3; color: var(--text-h);
    }
    .heading-ornament { width: 28px; height: 2px; background: var(--accent2); border-radius: 2px; }

    .card-divider .card-inner {
      text-align: center; min-height: 20dvh;
      display: flex; align-items: center; justify-content: center;
    }
    .divider-mark {
      font-family: 'Lora', serif; font-size: 1.1rem;
      color: var(--muted); letter-spacing: .5em;
    }

    /* ── Bottom bar (sempre visível) ─────────────────── */
    .bottom-bar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 180;
      height: calc(56px + env(safe-area-inset-bottom, 0px));
      padding: 0 8px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: var(--bg2); border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 2px;
      transition: background .3s;
    }
    .bar-nav {
      background: none; border: none; cursor: pointer;
      font-size: 1.7rem; font-weight: 300; color: var(--accent);
      width: 46px; height: 46px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; flex-shrink: 0;
    }
    .bar-nav:hover { background: var(--bg3); }
    .bar-spacer { flex: 1; }
    .bar-play {
      background: none; border: none; cursor: pointer;
      font-size: 1.35rem; color: var(--text);
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s; flex-shrink: 0;
    }
    .bar-play:hover { background: var(--bg3); }
    .bar-play.active { color: var(--accent2); }
    .bar-stop {
      background: none; border: none; cursor: pointer;
      font-size: .8rem; color: var(--muted);
      width: 28px; height: 28px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s, opacity .2s;
      flex-shrink: 0; opacity: 0.25; pointer-events: none;
    }
    .bar-stop.active { opacity: 1; color: var(--text); pointer-events: auto; }
    .bar-stop:hover { background: var(--bg3); }

    /* ── Swipe hint ───────────────────────────────────── */
    .swipe-hint {
      position: fixed;
      bottom: calc(56px + env(safe-area-inset-bottom, 0px) + 10px); left: 50%;
      transform: translateX(-50%);
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 14px;
      font-family: 'Inter', sans-serif; font-size: .7rem; color: var(--muted);
      z-index: 300; white-space: nowrap; pointer-events: none;
      transition: opacity .5s;
    }
    .swipe-hint.gone { opacity: 0; }

    /* ── Toast ───────────────────────────────────────── */
    .toast {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 5px 14px;
      font-family: 'Inter', sans-serif; font-size: .78rem; color: var(--text);
      z-index: 400; white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity .25s;
    }
    .toast.show { opacity: 1; }

    .tts-btn { display: none; } /* kept for compat, not used */

    .tts-speed {
      font-family: 'Inter', sans-serif; font-size: .75rem; font-weight: 600;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 4px 6px; cursor: pointer;
      transition: background .15s;
    }
    .tts-speed:hover { background: var(--border); }

    .tts-lang-sel {
      font-family: 'Inter', sans-serif; font-size: .72rem; font-weight: 600;
      background: var(--bg3); border: 1px solid var(--accent2);
      border-radius: 6px; color: var(--accent2); padding: 3px 5px; cursor: pointer;
      flex-shrink: 0; max-width: 72px;
    }

    /* ── Toolbar translate select ────────────────────────── */
    .tl-sel {
      font-family: 'Inter', sans-serif; font-size: .72rem; font-weight: 600;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted); padding: 3px 4px; cursor: pointer;
      flex-shrink: 0;
    }
    .tl-sel:focus { outline: none; border-color: var(--accent2); color: var(--accent2); }

    /* ── Popover Aa ──────────────────────────────────── */
    .aa-pop {
      position: fixed; top: 58px; right: 8px; z-index: 250;
      width: 232px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px;
      box-shadow: 0 12px 32px rgba(0,0,0,.18);
      display: flex; flex-direction: column; gap: 12px;
    }
    .aa-pop[hidden] { display: none; }
    .aa-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .aa-label {
      font-family: 'Inter', sans-serif; font-size: .7rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .06em;
    }
    .aa-group { display: flex; align-items: center; gap: 6px; }
    .aa-btn {
      font-family: 'Inter', sans-serif; font-size: .8rem; font-weight: 600;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 6px 10px; cursor: pointer;
      transition: background .15s;
    }
    .aa-btn:hover { background: var(--border); }
    .aa-val {
      font-family: 'Inter', sans-serif; font-size: .75rem; font-weight: 600;
      color: var(--muted); min-width: 38px; text-align: center;
    }

    /* ── Feedback de tradução ────────────────────────── */
    @keyframes xlatPulse { 50% { opacity: .4; } }
    .xlat-loading { animation: xlatPulse 1.1s ease-in-out infinite; }
    .xlat-badge {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: calc(56px + env(safe-area-inset-bottom, 0px) + 10px);
      background: var(--bg2); border: 1px solid var(--accent2);
      color: var(--accent2); border-radius: 20px; padding: 3px 12px;
      font-family: 'Inter', sans-serif; font-size: .68rem; font-weight: 600;
      letter-spacing: .04em; z-index: 170; pointer-events: none;
    }
    .xlat-badge[hidden] { display: none; }

    /* Karaoke word highlight */
    .tts-w { display: inline; }
    .tts-active {
      background: rgba(200,149,108,.32);
      color: var(--text-h);
      border-radius: 3px;
      outline: 1px solid rgba(200,149,108,.18);
      transition: background .08s;
    }
  </style>
</head>
<body>

<!-- ── Toolbar ─────────────────────────────────────────── -->
<nav class="toolbar" id="toolbar">
  <a href="/" class="btn-icon btn-back" title="Início">←</a>
  <div class="toolbar-center">
    <div class="tb-book" id="tb-book">{{ book.title }}</div>
    <div class="tb-chapter" id="tb-chapter"></div>
  </div>
  <div class="toolbar-right">
    <div class="tb-counter" id="tb-counter"></div>
    <button class="btn-icon" id="btn-xlat" title="Tradução automática">🌐</button>
    <button class="btn-icon" id="btn-aa" title="Aparência e idioma">Aa</button>
  </div>
</nav>

<!-- ── Popover Aa (fonte, tema, tradução) ──────────────── -->
<div class="aa-pop" id="aa-pop" hidden>
  <div class="aa-row">
    <span class="aa-label">Fonte</span>
    <div class="aa-group">
      <button class="aa-btn" id="btn-fs-down" title="Fonte menor">A−</button>
      <span class="aa-val" id="fs-val"></span>
      <button class="aa-btn" id="btn-fs-up" title="Fonte maior">A+</button>
    </div>
  </div>
  <div class="aa-row">
    <span class="aa-label">Tema</span>
    <button class="aa-btn" id="btn-dark"></button>
  </div>
  <div class="aa-row">
    <span class="aa-label">Voz</span>
    <select class="tl-sel" id="tts-engine">
      <option value="piper">Neural · no aparelho</option>
      <option value="server">Padrão · online</option>
    </select>
  </div>
  <div class="aa-row">
    <span class="aa-label">Traduzir para</span>
    <select class="tl-sel" id="target-lang">
      <option value="pt">PT</option>
      <option value="en">EN</option>
      <option value="es">ES</option>
      <option value="fr">FR</option>
      <option value="de">DE</option>
      <option value="it">IT</option>
      <option value="ja">JA</option>
      <option value="zh-CN">ZH</option>
      <option value="ru">RU</option>
    </select>
  </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<!-- ── Card stack ──────────────────────────────────────── -->
<div class="card-stack">
  <div class="card-slide" id="card-a"></div>
  <div class="card-slide" id="card-b" style="transform:translateY(100%)"></div>
</div>

<!-- ── Swipe hint ──────────────────────────────────────── -->
<div class="swipe-hint" id="swipe-hint">Deslize para cima — um feed, mas de livro</div>
<div class="toast" id="toast"></div>
<div class="xlat-badge" id="xlat-badge" hidden></div>

<!-- ── Bottom bar (navegação + TTS, sempre visível) ────── -->
<div class="bottom-bar">
  <button class="bar-nav" id="btn-prev" title="Página anterior">‹</button>
  <div class="bar-spacer"></div>
  <button class="bar-play" id="tts-play" title="Reproduzir / Pausar">▶</button>
  <select class="tts-lang-sel" id="tts-lang-sel" title="Idioma">
    <option value="pt-BR">PT</option>
    <option value="en-US">EN</option>
    <option value="es-ES">ES</option>
    <option value="fr-FR">FR</option>
    <option value="de-DE">DE</option>
    <option value="it-IT">IT</option>
    <option value="ja-JP">JA</option>
    <option value="zh-CN">ZH</option>
    <option value="ru-RU">RU</option>
  </select>
  <select class="tts-speed" id="tts-speed" title="Velocidade">
    <option value="0.75">0.75×</option>
    <option value="1" selected>1×</option>
    <option value="1.25">1.25×</option>
    <option value="1.5">1.5×</option>
    <option value="2">2×</option>
  </select>
  <button class="bar-stop" id="tts-stop" title="Parar narração">✕</button>
  <div class="bar-spacer"></div>
  <button class="bar-nav" id="btn-next" title="Próxima página">›</button>
</div>

<script>
(function () {
  // ── Data ────────────────────────────────────────────────────────
  const SECTIONS       = {{ book.sections | tojson }};
  const BOOK_ID        = {{ book.id | tojson }};
  const BOOK_TITLE     = {{ book.title | tojson }};
  const BOOK_LANG      = {{ (book.lang.iso if book.lang else 'unknown') | tojson }};
  const BOOK_BCP47     = {{ (book.lang.bcp47 if book.lang else 'unknown') | tojson }};
  const BOOK_FORMAT    = {{ book.format | tojson }};
  const TOTAL_SECTIONS = {{ book.sections | length }};
  const COOKIE_KEY     = 'card_' + BOOK_ID;
  const YEAR_MS        = 365 * 24 * 60 * 60 * 1000;

  const LANG_NAMES  = {
    pt:'Português', en:'Inglês', es:'Espanhol', fr:'Francês', de:'Alemão',
    it:'Italiano', ja:'Japonês', zh:'Chinês', ru:'Russo', ar:'Árabe',
    ko:'Coreano', nl:'Holandês', pl:'Polonês', tr:'Turco',
  };

  // ── Helpers ──────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const setCookie = (k,v,ms) =>
    (document.cookie=`${k}=${encodeURIComponent(v)};expires=${new Date(Date.now()+ms).toUTCString()};path=/;SameSite=Lax`);
  const getCookie = k => {
    const m = document.cookie.match(new RegExp('(?:^|; )'+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : null;
  };

  // ── Theme ────────────────────────────────────────────────────────
  const html  = document.documentElement;
  let dark = localStorage.getItem('readerDark')==='1'
    || (localStorage.getItem('readerDark')===null && matchMedia('(prefers-color-scheme:dark)').matches);
  const applyTheme = () => {
    html.classList.toggle('dark', dark);
    $('btn-dark').textContent = dark ? '☀ Claro' : '☽ Escuro';
    localStorage.setItem('readerDark', dark?'1':'0');
  };
  applyTheme();
  $('btn-dark').addEventListener('click', () => { dark=!dark; applyTheme(); });

  // ── Popover Aa ────────────────────────────────────────────────────
  const aaPop = $('aa-pop');
  $('btn-aa').addEventListener('click', e => {
    e.stopPropagation();
    aaPop.hidden = !aaPop.hidden;
    $('btn-aa').classList.toggle('active', !aaPop.hidden);
  });
  document.addEventListener('click', e => {
    if (!aaPop.hidden && !aaPop.contains(e.target)) {
      aaPop.hidden = true;
      $('btn-aa').classList.remove('active');
    }
  });

  // ── Font size ─────────────────────────────────────────────────────
  let fs = parseInt(localStorage.getItem('readerFs')||'19', 10);
  let toastTimer;
  const showToast = msg => {
    $('toast').textContent = msg;
    $('toast').classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>$('toast').classList.remove('show'), 1400);
  };
  const applyFs = () => {
    html.style.setProperty('--fs', fs+'px');
    localStorage.setItem('readerFs', fs);
    $('fs-val').textContent = fs+'px';
  };
  applyFs();
  $('btn-fs-up').addEventListener('click',   () => { if(fs<28){fs++;applyFs();} });
  $('btn-fs-down').addEventListener('click', () => { if(fs>14){fs--;applyFs();} });

  // ── Card building ──────────────────────────────────────────────────
  function splitBySentence(text, maxLen) {
    const pieces = text.match(/[^.!?…]+[.!?…]+["»]?\s*/g) || [text];
    const chunks = []; let cur = '';
    for (const s of pieces) {
      if (cur && cur.length+s.length > maxLen) { chunks.push(cur.trimEnd()); cur=s; }
      else cur += s;
    }
    if (cur.trim()) chunks.push(cur.trim());
    return chunks.length ? chunks : [text];
  }

  function buildCards() {
    const cards = [];
    let chapterTitle = '', chapterCount = 0;

    for (let sIdx = 0; sIdx < SECTIONS.length; sIdx++) {
      const section = SECTIONS[sIdx];
      if (!section.html) continue;
      const mark = cards.length;   // first card index for this section

      const doc  = new DOMParser().parseFromString(section.html, 'text/html');
      const body = doc.body;
      const SELS = 'p,h1,h2,h3,h4,h5,h6,blockquote,hr,ul,ol,figure';

      let nodes = Array.from(body.querySelectorAll(SELS));
      nodes = nodes.filter(n => {
        let p = n.parentElement;
        while (p && p!==body) { if (nodes.includes(p)) return false; p=p.parentElement; }
        return true;
      });

      if (!nodes.length) {
        const text = body.textContent.trim();
        if (!text) continue;
        for (const chunk of splitBySentence(text, 580))
          cards.push({ type:'text', html:`<p>${chunk}</p>`, chapter:chapterTitle });
      } else {
        let buf=[], bufLen=0;
        const LIMIT=580, DIAL=110;
        const flush = () => {
          if (buf.length) cards.push({ type:'text', html:buf.join(''), chapter:chapterTitle });
          buf=[]; bufLen=0;
        };

        for (const node of nodes) {
          const tag=node.tagName, text=node.textContent.trim();
          if (!text && tag!=='HR') continue;

          if (tag==='HR') { flush(); cards.push({type:'divider',chapter:chapterTitle}); continue; }

          if (tag==='H1'||tag==='H2') {
            flush(); chapterTitle=text; chapterCount++;
            cards.push({type:'chapter',html:node.outerHTML,chapter:text,num:chapterCount}); continue;
          }
          if (tag==='H3'||tag==='H4') {
            flush(); cards.push({type:'heading',html:node.outerHTML,chapter:chapterTitle}); continue;
          }
          if (tag==='H5'||tag==='H6') {
            if (bufLen+text.length>LIMIT && buf.length) flush();
            buf.push(node.outerHTML); bufLen+=text.length; continue;
          }
          if (text.length>700) {
            flush();
            for (const chunk of splitBySentence(text, 560))
              cards.push({type:'text',html:`<p>${chunk}</p>`,chapter:chapterTitle});
            continue;
          }
          if (text.length<=DIAL) {
            if (bufLen+text.length>LIMIT && buf.length) flush();
            buf.push(node.outerHTML); bufLen+=text.length; continue;
          }
          if (bufLen+text.length>LIMIT && buf.length) flush();
          buf.push(node.outerHTML); bufLen+=text.length;
          if (bufLen>=LIMIT) flush();
        }
        flush();
      }

      // Tag every card from this section with its 1-based source index (= PDF page number)
      for (let i = mark; i < cards.length; i++) cards[i].sectionIdx = sIdx + 1;
    }
    return cards;
  }

  const CARDS = buildCards();
  const TOTAL = CARDS.length;

  // Compute char offsets for estimated page numbers (EPUB)
  const PAGE_SIZE = 1800;   // ~chars per printed page
  let _off = 0;
  for (const card of CARDS) {
    const len = card.html ? card.html.replace(/<[^>]+>/g, '').length : 0;
    card.charOffset = _off;
    card.charLen    = len;
    _off += len;
  }
  const TOTAL_CHARS     = _off;
  const TOTAL_PAGES_EST = Math.max(1, Math.ceil(TOTAL_CHARS / PAGE_SIZE));

  // Junta blocos de texto com pausa natural (ponto no final se não tiver pontuação)
  function extractTextWithPauses(el) {
    const blocks = el.querySelectorAll('p,h1,h2,h3,h4,h5,h6,li,blockquote');
    if (blocks.length <= 1) return el.textContent.trim();
    return Array.from(blocks).map(b => {
      const t = b.textContent.trim();
      return t && !/[.!?…»"']$/.test(t) ? t + '.' : t;
    }).filter(t => t).join(' ');
  }

  // Plain-text extraction per card (for TTS)
  function cardText(idx) {
    const tmp = document.createElement('div');
    tmp.innerHTML = CARDS[idx].html || '';
    return extractTextWithPauses(tmp);
  }

  // Texto para tradução: parágrafos separados por \n\n (o Google Translate
  // preserva o separador, então a tradução volta com os parágrafos intactos)
  function cardTextForXlat(idx) {
    const tmp = document.createElement('div');
    tmp.innerHTML = CARDS[idx].html || '';
    const blocks = Array.from(tmp.querySelectorAll('p,li,blockquote,h1,h2,h3,h4,h5,h6'));
    return blocks.length > 1
      ? blocks.map(b => b.textContent.trim()).filter(t => t).join('\n\n')
      : tmp.textContent.trim();
  }

  // ── Render cards ─────────────────────────────────────────────────
  function renderCard(el, card) {
    el.innerHTML = '';
    el.className = 'card-slide';
    const inner = document.createElement('div');
    inner.className = 'card-inner';
    if (card.type==='chapter') {
      el.classList.add('card-chapter');
      inner.innerHTML = `<div class="ch-num">Capítulo ${card.num}</div>${card.html}<div class="ch-line"></div>`;
    } else if (card.type==='heading') {
      el.classList.add('card-heading');
      inner.innerHTML = `${card.html}<div class="heading-ornament"></div>`;
    } else if (card.type==='divider') {
      el.classList.add('card-divider');
      inner.innerHTML = '<div class="divider-mark">* &thinsp; * &thinsp; *</div>';
    } else {
      el.classList.add('card-text');
      inner.innerHTML = card.html;
    }
    el.appendChild(inner);
  }

  function updateUI(idx) {
    const card    = CARDS[idx];
    // Percentual lido: mesma métrica do contador (chars p/ EPUB, página p/ PDF)
    let pct;
    if (BOOK_FORMAT === 'pdf' && card.sectionIdx) {
      pct = (card.sectionIdx / TOTAL_SECTIONS) * 100;
    } else if (TOTAL_CHARS > 0 && card.charLen !== undefined) {
      pct = ((card.charOffset + card.charLen) / TOTAL_CHARS) * 100;
    } else {
      pct = TOTAL>1 ? (idx/(TOTAL-1))*100 : 100;
    }
    const counter = $('tb-counter');
    $('progress-fill').style.width = pct+'%';

    if (BOOK_FORMAT === 'pdf' && card.sectionIdx) {
      counter.className   = 'tb-counter';
      counter.textContent = `Pág. ${card.sectionIdx} / ${TOTAL_SECTIONS}`;
    } else if (BOOK_FORMAT === 'epub' && card.sectionIdx) {
      const estPage = Math.max(1, Math.ceil((card.charOffset + card.charLen / 2) / PAGE_SIZE));
      counter.className = 'tb-counter two-line';
      counter.innerHTML  = `Seç. ${card.sectionIdx} / ${TOTAL_SECTIONS}<br>~Pág. ${estPage} / ${TOTAL_PAGES_EST}`;
    } else {
      counter.className   = 'tb-counter';
      counter.textContent = `${idx+1} / ${TOTAL}`;
    }

    $('tb-chapter').textContent = card.chapter||'';
    $('tb-book').textContent    = BOOK_TITLE;
    document.title = `${Math.round(pct)}% · ${BOOK_TITLE} — f9`;
  }

  // ── Navigation ────────────────────────────────────────────────────
  let front=  $('card-a'), back=$('card-b');
  let current=0, busy=false;
  const DUR=320;

  // Estado pós-navegação compartilhado entre goTo (botões/teclas) e o swipe físico
  function afterNav(idx) {
    current=idx;
    setCookie(COOKIE_KEY, idx, YEAR_MS);
    updateUI(current);
    busy=false;

    // Reset translation state for new card
    translatedNow = false; _translatedLang = null;
    $('btn-xlat').classList.toggle('active', translationMode);
    $('xlat-badge').hidden = true;
    clearTimeout(_autoXlatTimer);

    if (translationMode && ttsActive) {
      // Narrando com tradução: espera traduzir antes de falar — senão o TTS
      // começa no idioma original e é cancelado no meio pela tradução
      cancelCurrent();
      _autoXlatTimer = setTimeout(() => {
        translateCard(current).then(ok => {
          if (!ok && ttsActive) setTimeout(ttsSpeak, 60);   // falhou → lê o original
        });
      }, 120);
    } else {
      if (translationMode) _autoXlatTimer = setTimeout(() => translateCard(current), 1000);
      if (ttsActive) { cancelCurrent(); setTimeout(ttsSpeak, 60); }
    }
  }

  function goTo(idx, dir) {
    if (busy||idx<0||idx>=TOTAL||idx===current) return;
    busy=true;
    if (ttsActive) { saveTTSPos(); cancelCurrent(); }   // salva posição e corta o áudio

    // Capítulos entram com fade mais lento — pequena cerimônia
    const isCh = CARDS[idx].type==='chapter';
    const D    = isCh ? 500 : DUR;

    renderCard(back, CARDS[idx]);
    back.style.transition='none';
    back.style.transform = dir>0 ? 'translateY(100%)' : 'translateY(-100%)';
    if (isCh) back.style.opacity='0.25';
    back.getBoundingClientRect();

    const ease = `transform ${D}ms cubic-bezier(0.25,1,0.5,1), opacity ${D}ms ease`;
    front.style.transition=ease; back.style.transition=ease;
    front.style.transform = dir>0 ? 'translateY(-100%)' : 'translateY(100%)';
    back.style.transform  = 'translateY(0)';
    back.style.opacity='1';

    setTimeout(() => {
      front.style.transition='none';
      front.style.transform  = dir>0 ? 'translateY(100%)' : 'translateY(-100%)';
      front.style.opacity=''; back.style.opacity='';
      [front,back]=[back,front];
      afterNav(idx);
    }, D);
  }

  const next=()=>goTo(current+1, 1);
  const prev=()=>goTo(current-1,-1);

  // ── Init ──────────────────────────────────────────────────────────
  const saved    = parseInt(getCookie(COOKIE_KEY)||'0', 10);
  const startIdx = (saved>=0&&saved<TOTAL) ? saved : 0;
  front.style.transform='translateY(0)';
  renderCard(front, CARDS[startIdx]);
  current=startIdx;
  updateUI(current);

  // ── Keyboard ──────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
    switch(e.code) {
      case 'Space':      e.preventDefault(); e.shiftKey?prev():next(); break;
      case 'ArrowRight': case 'ArrowDown': case 'PageDown':
        e.preventDefault(); next(); break;
      case 'ArrowLeft': case 'ArrowUp': case 'PageUp': case 'Backspace':
        e.preventDefault(); prev(); break;
    }
  });

  // ── Swipe físico: o card segue o dedo ────────────────────────────
  const stack = document.querySelector('.card-stack');
  const hint=$('swipe-hint'); let hintGone=false;
  const dismissHint=()=>{ if(!hintGone){hintGone=true;hint.classList.add('gone');} };
  setTimeout(dismissHint,4500);

  let dragOn=false, dragEngaged=false, dragDir=0, dragIdx=-1, edgeDrag=false;
  let dY=0, startY=0, startX=0, lastY=0, lastT=0, vel=0;

  // Se o conteúdo do card ainda pode rolar na direção do gesto, deixa rolar
  function innerCanScroll(dir) {
    const inner = front.querySelector('.card-inner');
    if (!inner) return false;
    if (dir>0) return inner.scrollTop + inner.clientHeight < inner.scrollHeight - 2;
    return inner.scrollTop > 2;
  }

  document.addEventListener('touchstart', e => {
    if (busy || e.target.closest('.toolbar,.bottom-bar,.aa-pop')) { dragOn=false; return; }
    const t=e.changedTouches[0];
    dragOn=true; dragEngaged=false; dY=0; vel=0; dragDir=0; dragIdx=-1; edgeDrag=false;
    startY=t.clientY; startX=t.clientX; lastY=t.clientY; lastT=e.timeStamp;
  }, {passive:true});

  document.addEventListener('touchmove', e => {
    if (!dragOn || busy) return;
    const t=e.changedTouches[0];
    const dy=t.clientY-startY, dx=t.clientX-startX;
    const dt=e.timeStamp-lastT;
    if (dt>0) { vel=(t.clientY-lastY)/dt; lastY=t.clientY; lastT=e.timeStamp; }

    if (!dragEngaged) {
      if (Math.abs(dy)<12 || Math.abs(dy)<Math.abs(dx)*1.2) return;
      const dir = dy<0 ? 1 : -1;
      if (innerCanScroll(dir)) { dragOn=false; return; }
      dragEngaged=true; dragDir=dir;
      dragIdx=current+dir;
      edgeDrag = dragIdx<0 || dragIdx>=TOTAL;
      if (!edgeDrag) { renderCard(back, CARDS[dragIdx]); back.style.transition='none'; }
      front.style.transition='none';
      dismissHint();
    }

    e.preventDefault();
    dY=t.clientY-startY;
    const h=stack.clientHeight;

    if (edgeDrag) {                          // rubber-band na primeira/última página
      front.style.transform=`translateY(${dY*0.35}px)`;
      return;
    }
    const eff = dragDir>0 ? Math.min(0,dY) : Math.max(0,dY);
    front.style.transform=`translateY(${eff}px)`;
    back.style.transform =`translateY(${(dragDir>0?h:-h)+eff}px)`;
  }, {passive:false});

  function endDrag() {
    if (!dragOn) return;
    dragOn=false;
    if (!dragEngaged) return;
    dragEngaged=false;
    const h=stack.clientHeight;

    if (edgeDrag) {
      front.style.transition='transform 260ms cubic-bezier(0.25,1,0.5,1)';
      front.style.transform='translateY(0)';
      return;
    }

    const eff    = dragDir>0 ? Math.min(0,dY) : Math.max(0,dY);
    const flick  = dragDir>0 ? vel<-0.45 : vel>0.45;   // px/ms
    const commit = Math.abs(eff)>h*0.22 || flick;
    busy=true;
    const dur  = commit ? Math.max(160, 300-Math.abs(vel)*120) : 240;
    const ease = `transform ${dur}ms cubic-bezier(0.25,1,0.5,1)`;
    front.style.transition=ease; back.style.transition=ease;

    if (commit) {
      if (ttsActive) { saveTTSPos(); cancelCurrent(); }
      front.style.transform=`translateY(${dragDir>0?-h:h}px)`;
      back.style.transform='translateY(0)';
      const idx=dragIdx, dir=dragDir;
      setTimeout(()=>{
        front.style.transition='none';
        front.style.transform = dir>0 ? 'translateY(100%)' : 'translateY(-100%)';
        [front,back]=[back,front];
        afterNav(idx);
      }, dur);
    } else {
      front.style.transform='translateY(0)';
      back.style.transform=`translateY(${dragDir>0?'100%':'-100%'})`;
      setTimeout(()=>{ busy=false; }, dur);
    }
  }
  document.addEventListener('touchend', endDrag, {passive:true});
  document.addEventListener('touchcancel', endDrag, {passive:true});

  // Toolbar sempre visível

  // ── Recent books ──────────────────────────────────────────────────
  try {
    let r=JSON.parse(localStorage.getItem('recentBooks')||'[]');
    r=r.filter(b=>b.id!==BOOK_ID);
    r.unshift({id:BOOK_ID,title:BOOK_TITLE,total:TOTAL});
    localStorage.setItem('recentBooks',JSON.stringify(r.slice(0,10)));
  } catch {}

  // ════════════════════════════════════════════════════════════════
  // TTS — Edge TTS (servidor, vozes neurais) + Web Speech fallback
  // ════════════════════════════════════════════════════════════════
  const synth = window.speechSynthesis;
  let ttsActive=false, ttsPaused=false, ttsRate=1, _usingEdge=false, _ttsGen=0;
  let _audioCtx=null, _audioSrc=null;   // Web Audio API (bypasses iOS autoplay + silent mode)

  // ── Posição do TTS: para no meio, retoma de onde parou ───────────
  const TTS_POS_KEY = 'ttsPos_' + BOOK_ID;
  let _ttsCharPos = 0;   // char offset da palavra sendo lida agora
  const saveTTSPos  = () => { if (_ttsCharPos > 20) try { localStorage.setItem(TTS_POS_KEY, JSON.stringify({card: current, pos: _ttsCharPos})); } catch {} };
  const clearTTSPos = () => { _ttsCharPos = 0; try { localStorage.removeItem(TTS_POS_KEY); } catch {} };
  const loadTTSPos  = () => { try { const d=JSON.parse(localStorage.getItem(TTS_POS_KEY)||'null'); return (d&&d.card===current&&d.pos>20)?d.pos:0; } catch { return 0; } };

  const ISO_TO_BCP47 = {
    'pt':'pt-BR','en':'en-US','es':'es-ES','fr':'fr-FR','de':'de-DE',
    'it':'it-IT','ja':'ja-JP','zh':'zh-CN','zh-cn':'zh-CN',
    'ru':'ru-RU','ar':'ar-SA','ko':'ko-KR','nl':'nl-NL','tr':'tr-TR',
  };

  // Web Speech voices (used as fallback only)
  let _voices = [];
  function loadVoices() { _voices = synth.getVoices(); }
  loadVoices(); synth.onvoiceschanged = loadVoices;
  function pickVoice(bcp47) {
    if (!_voices.length) loadVoices();
    const lo = bcp47.toLowerCase(), base = lo.split('-')[0];
    return _voices.find(v => v.lang.toLowerCase() === lo)
        || _voices.find(v => v.lang.toLowerCase().startsWith(base)) || null;
  }

  function ttsContext() {
    if (translatedNow && _translatedLang) {
      const inner = front.querySelector('.card-inner');
      const text  = inner ? extractTextWithPauses(inner) : cardText(current);
      return { text, lang: _translatedLang, container: inner };
    }
    return { text: cardText(current), lang: $('tts-lang-sel').value,
             container: front.querySelector('.card-inner') };
  }

  // ── Piper TTS: voz neural rodando no aparelho via WASM ───────────
  // Modelo (~60MB) baixa uma vez e fica em OPFS; síntese 100% local.
  const PIPER_CDN = 'https://cdn.jsdelivr.net/npm/@mintplex-labs/piper-tts-web@1.0.4/+esm';
  const PIPER_VOICES = {
    pt:'pt_BR-faber-medium',  en:'en_US-hfc_female-medium', es:'es_ES-davefx-medium',
    fr:'fr_FR-siwis-medium',  de:'de_DE-thorsten-medium',   it:'it_IT-riccardo-x_low',
    ru:'ru_RU-irina-medium',  zh:'zh_CN-huayan-medium',
  };
  let ttsEngine = localStorage.getItem('ttsEngine') || 'piper';
  let _piperMod = null, _piperFailed = false;
  const _piperReady = {};   // voiceId → true depois da primeira síntese ok

  function piperModule() {
    if (_piperFailed) return Promise.reject(new Error('piper_unavailable'));
    if (!_piperMod) {
      _piperMod = import(PIPER_CDN).catch(e => {
        _piperFailed = true; _piperMod = null; throw e;
      });
    }
    return _piperMod;
  }

  // quiet=true (prefetch): nunca dispara download de modelo nem toasts
  async function piperSynth(text, lang, quiet) {
    const voiceId = PIPER_VOICES[lang];
    if (!voiceId) throw new Error('no_piper_voice');
    const tts = await piperModule();
    if (!_piperReady[voiceId]) {
      const stored = await tts.stored().catch(() => []);
      if (!stored.includes(voiceId)) {
        if (quiet) throw new Error('model_not_cached');
        showToast('Baixando voz neural — só na primeira vez');
      }
    }
    let lastPct = -1;
    const wav = await tts.predict({ text, voiceId }, p => {
      if (quiet || !p.total) return;
      const pct = Math.round(p.loaded * 100 / p.total);
      if (pct !== lastPct) { lastPct = pct; showToast(`Baixando voz neural… ${pct}%`); }
    });
    _piperReady[voiceId] = true;
    return await wav.arrayBuffer();
  }

  // Karaokê estimado: distribui a duração real do áudio pelos tamanhos das palavras
  function estimateWordTimings(text, totalMs) {
    const raw = text.match(/\S+/g) || [];
    const totalChars = raw.reduce((a, w) => a + w.length + 1, 0) || 1;
    let t = 0;
    return raw.map(w => {
      const d = totalMs * (w.length + 1) / totalChars;
      const o = { w, s: Math.round(t), d: Math.round(d) };
      t += d;
      return o;
    });
  }

  // Pré-busca o áudio da próxima página enquanto a atual toca —
  // elimina o silêncio entre cards no modo narração contínua.
  const _ttsPre = new Map();   // "idx|lang|rate" → Promise<{words, buf, piper}>
  async function prefetchTTS(idx) {
    if (idx >= TOTAL) return;
    let text, lang;
    if (translationMode) {
      const to = $('target-lang').value;
      const t  = cache[`${idx}_${to}`];
      if (!t) return;                     // tradução ainda não chegou; sem prefetch
      text = t; lang = to.split('-')[0];
    } else {
      text = cardText(idx); lang = $('tts-lang-sel').value.split('-')[0];
    }
    if (!text.trim()) return;
    const key = `${idx}|${lang}|${ttsRate}`;
    if (_ttsPre.has(key)) return;
    const p = (async () => {
      // Neural local primeiro — sem tocar na rede se o modelo já está aqui
      if (ttsEngine === 'piper' && PIPER_VOICES[lang]) {
        try { return { words: null, buf: await piperSynth(text, lang, true), piper: true }; }
        catch {}
      }
      const r = await fetch('/api/tts', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ text, lang, rate: ttsRate }),
      });
      if (!r.ok) throw new Error('prefetch_failed');
      const j   = await r.json();
      const buf = await (await fetch(j.audio)).arrayBuffer();
      return { words: j.words, buf };
    })();
    p.catch(() => _ttsPre.delete(key));
    _ttsPre.set(key, p);
    if (_ttsPre.size > 4) _ttsPre.delete(_ttsPre.keys().next().value);
  }

  // ── Karaoke ───────────────────────────────────────────────────
  let wordSpans=[], activeSpan=null, spanSeqIdx=-1;

  function wrapWords(container) {
    wordSpans=[]; spanSeqIdx=-1;
    let offset=0;
    function walk(node) {
      if (node.nodeType===3) {
        const tokens=node.textContent.split(/(\s+)/);
        const frag=document.createDocumentFragment();
        for (const tok of tokens) {
          if (!tok) continue;
          if (/\S/.test(tok)) {
            const sp=document.createElement('span');
            sp.className='tts-w'; sp._s=offset; sp._e=offset+tok.length;
            sp.textContent=tok; wordSpans.push(sp); frag.appendChild(sp);
          } else { frag.appendChild(document.createTextNode(tok)); }
          offset+=tok.length;
        }
        node.parentNode.replaceChild(frag,node);
      } else if (node.nodeType===1) { Array.from(node.childNodes).forEach(walk); }
    }
    Array.from(container.childNodes).forEach(walk);
  }

  function unwrapWords() {
    for (const sp of wordSpans) { if (sp.parentNode) sp.replaceWith(sp.textContent); }
    if (activeSpan?.parentNode) activeSpan.parentNode.normalize();
    wordSpans=[]; activeSpan=null; spanSeqIdx=-1;
  }

  // Web Speech: highlight by char offset
  function highlightWord(charIndex) {
    _ttsCharPos = charIndex;
    if (activeSpan) activeSpan.classList.remove('tts-active');
    const found = wordSpans.find(sp=>sp._s<=charIndex&&sp._e>charIndex)
               || wordSpans.find(sp=>sp._s>=charIndex);
    if (found) { found.classList.add('tts-active'); activeSpan=found; found.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  }

  // Edge TTS: highlight by word text (sequential scan, tolerates punctuation)
  function highlightWordByText(word) {
    if (activeSpan) activeSpan.classList.remove('tts-active');
    const norm = s => s.replace(/[^\w]/g,'').toLowerCase();
    const nw   = norm(word);
    const end  = Math.min(spanSeqIdx + 10, wordSpans.length);
    for (let i = Math.max(0, spanSeqIdx); i < end; i++) {
      if (norm(wordSpans[i].textContent) === nw) {
        spanSeqIdx=i+1; wordSpans[i].classList.add('tts-active'); activeSpan=wordSpans[i];
        _ttsCharPos = wordSpans[i]._s;
        wordSpans[i].scrollIntoView({behavior:'smooth',block:'nearest'}); return;
      }
    }
  }

  // ── Engine control ────────────────────────────────────────────
  function cancelCurrent() {
    _ttsGen++;   // invalida ttsSpeak() em andamento e todos os timers/fetches com gen capturado
    if (_usingEdge) {
      if (_audioSrc) { try { _audioSrc.onended=null; _audioSrc.stop(0); } catch {} _audioSrc=null; }
    } else { synth.cancel(); }
  }

  async function ttsSpeak() {
    const gen = ++_ttsGen;
    _ttsCharPos = 0;
    const resumePos = loadTTSPos();
    if (resumePos > 0) clearTTSPos();   // consumido — não reusar

    const { text: fullText, lang, container } = ttsContext();
    const text = resumePos > 0 ? fullText.slice(resumePos) : fullText;
    if (!text.trim()) { if (ttsActive) next(); return; }

    unwrapWords();
    if (container) {
      wrapWords(container);
      // Reposiciona o karaokê no ponto de retomada
      if (resumePos > 0) {
        const startIdx = wordSpans.findIndex(sp => sp._s >= resumePos);
        if (startIdx >= 0) { spanSeqIdx = startIdx; highlightWord(wordSpans[startIdx]._s); }
      }
    }

    $('tts-play').textContent='⏳';
    $('tts-stop').classList.add('active');

    // ── Try server TTS via Web Audio API (bypasses iOS autoplay + silent mode) ──
    try {
      let words, arrayBuf, isPiper = false;

      // Áudio pré-buscado? Usa direto, sem round-trip (não vale se retomando do meio)
      const preKey = `${current}|${lang.split('-')[0]}|${ttsRate}`;
      if (!resumePos && _ttsPre.has(preKey)) {
        try {
          const pre = await _ttsPre.get(preKey);
          words = pre.words; arrayBuf = pre.buf.slice(0); isPiper = !!pre.piper;
        } catch {}
        _ttsPre.delete(preKey);
        if (gen !== _ttsGen || !ttsActive) return;
      }

      // Voz neural no aparelho (Piper WASM)
      if (!arrayBuf && ttsEngine === 'piper') {
        try {
          arrayBuf = await piperSynth(text, lang.split('-')[0], false);
          isPiper = true;
        } catch {}
        if (gen !== _ttsGen || !ttsActive) return;
      }

      if (!arrayBuf) {
        const resp = await fetch('/api/tts', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ text, lang: lang.split('-')[0], rate: ttsRate }),
          signal: AbortSignal.timeout(20000),
        });
        if (gen !== _ttsGen || !ttsActive) return;
        if (!resp.ok) throw new Error('server_unavailable');
        const j = await resp.json();
        words = j.words;
        if (gen !== _ttsGen || !ttsActive) return;

        // Fetch audio bytes (not just a URL) so AudioContext can decode them
        const audioResp = await fetch(j.audio);
        if (gen !== _ttsGen || !ttsActive) return;
        arrayBuf = await audioResp.arrayBuffer();
        if (gen !== _ttsGen || !ttsActive) return;
      }

      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // Sem await: fora do gesto do usuário o resume() não resolve no iOS.
      // O contexto já foi desbloqueado pelo buffer silencioso em ttsToggle().
      if (_audioCtx.state === 'suspended') _audioCtx.resume().catch(() => {});
      const audioBuf = await _audioCtx.decodeAudioData(arrayBuf);
      if (gen !== _ttsGen || !ttsActive) return;

      // Piper gera a 1×: a velocidade entra na reprodução, e o karaokê
      // é estimado sobre a duração real já ajustada
      if (isPiper || !words) {
        words = estimateWordTimings(text, audioBuf.duration * 1000 / (isPiper ? ttsRate : 1));
      }

      _usingEdge = true;
      _audioSrc = _audioCtx.createBufferSource();
      _audioSrc.buffer = audioBuf;
      if (isPiper) _audioSrc.playbackRate.value = ttsRate;
      _audioSrc.connect(_audioCtx.destination);

      // Karaoke: track playback position with rAF instead of ontimeupdate
      const t0 = _audioCtx.currentTime;
      let wIdx = 0;
      (function raf() {
        if (!ttsActive || gen !== _ttsGen) return;
        const ms = (_audioCtx.currentTime - t0) * 1000;
        while (wIdx < words.length && ms >= words[wIdx].s) { highlightWordByText(words[wIdx].w); wIdx++; }
        requestAnimationFrame(raf);
      })();

      _audioSrc.onended = () => {
        unwrapWords();
        if (!ttsActive || gen !== _ttsGen) return;
        clearTTSPos();   // terminou a página naturalmente — não retomar aqui
        if (current < TOTAL-1) next(); else ttsStop();
      };
      _audioSrc.start(0);
      prefetchTTS(current+1);

    } catch {
      // ── Fallback: Web Speech API ──────────────────────────────
      if (gen !== _ttsGen || !ttsActive) return;
      _usingEdge = false;
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang=lang; utt.rate=ttsRate;
      const voice=pickVoice(lang); if (voice) utt.voice=voice;

      // Chrome bug: onend sometimes never fires — advance after estimated duration
      const estMs = Math.ceil(text.length * 14 / ttsRate) + 4000;
      let _fbTimer = setTimeout(() => {
        if (!ttsActive || synth.speaking || gen !== _ttsGen) return;
        clearTTSPos(); unwrapWords(); if (current<TOTAL-1) next(); else ttsStop();
      }, estMs);

      utt.onboundary = e => { if (e.name==='word') highlightWord(resumePos + e.charIndex); };
      utt.onend  = () => { clearTimeout(_fbTimer); if (!ttsActive||gen!==_ttsGen) return; clearTTSPos(); unwrapWords(); if (current<TOTAL-1) next(); else ttsStop(); };
      // iOS Safari dispara 'canceled' (não 'interrupted') em synth.cancel() intencional
      utt.onerror = e => { clearTimeout(_fbTimer); unwrapWords(); if (e.error!=='interrupted'&&e.error!=='canceled') ttsStop(); };
      synth.cancel(); synth.speak(utt);
    }

    updateTtsBtn();
  }

  function ttsToggle() {
    if (!ttsActive) {
      ttsActive=true; ttsPaused=false;
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // iOS Safari exige um buffer real tocado sincronicamente DENTRO do gesto
      // para desbloquear o AudioContext — resume() sozinho não basta.
      try {
        const silSrc = _audioCtx.createBufferSource();
        silSrc.buffer = _audioCtx.createBuffer(1, 1, 22050);
        silSrc.connect(_audioCtx.destination); silSrc.start(0);
      } catch {}
      // Prime do Web Speech no gesto (destrava o fallback no iOS)
      try { const u = new SpeechSynthesisUtterance(''); u.volume = 0; synth.speak(u); } catch {}
      // Encadeia após o resume — contexto 'running' antes de decodificar
      _audioCtx.resume().then(() => ttsSpeak()).catch(() => ttsSpeak());
    } else if (ttsPaused) {
      if (_usingEdge) { _audioCtx && _audioCtx.resume().catch(() => {}); } else synth.resume();
      ttsPaused=false; updateTtsBtn();
    } else {
      if (_usingEdge) { _audioCtx && _audioCtx.suspend().catch(() => {}); } else synth.pause();
      ttsPaused=true; updateTtsBtn();
    }
  }

  function ttsStop() {
    saveTTSPos();
    cancelCurrent(); unwrapWords();
    ttsActive=false; ttsPaused=false; _usingEdge=false;
    $('tts-play').textContent='▶';
    $('tts-play').classList.remove('active');
    $('tts-stop').classList.remove('active');
    // Resume context so it's ready for next play (may have been suspended by pause)
    if (_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume().catch(() => {});
  }

  function updateTtsBtn() {
    const playing = ttsActive && !ttsPaused;
    $('tts-play').textContent = playing ? '⏸' : '▶';
    $('tts-play').classList.toggle('active', ttsActive);
    $('tts-stop').classList.toggle('active', ttsActive);
  }

  const detectedBcp47 = BOOK_BCP47!=='unknown' ? BOOK_BCP47 : (ISO_TO_BCP47[navigator.language.split('-')[0]]||'pt-BR');
  $('tts-lang-sel').value = detectedBcp47;
  if (!$('tts-lang-sel').value) $('tts-lang-sel').value = 'pt-BR';

  $('tts-play').addEventListener('click', ttsToggle);
  $('tts-stop').addEventListener('click', ttsStop);
  $('btn-prev').addEventListener('click', prev);
  $('btn-next').addEventListener('click', next);
  $('tts-speed').addEventListener('change', e => {
    ttsRate=parseFloat(e.target.value);
    _ttsPre.clear();
    if (ttsActive && !ttsPaused) { cancelCurrent(); setTimeout(ttsSpeak, 60); }
  });
  $('tts-engine').value = ttsEngine;
  $('tts-engine').addEventListener('change', e => {
    ttsEngine = e.target.value;
    localStorage.setItem('ttsEngine', ttsEngine);
    _ttsPre.clear();
    if (ttsActive && !ttsPaused) { cancelCurrent(); setTimeout(ttsSpeak, 60); }
  });

  // ════════════════════════════════════════════════════════════════
  // TRANSLATION — inline (replaces card text in place)
  // Primary: Google Translate unofficial · Fallback: MyMemory
  // ════════════════════════════════════════════════════════════════
  // Cache persistente por livro — quem lê traduzido não re-traduz a cada sessão
  const XLAT_KEY = 'xlat_' + BOOK_ID;
  let cache = {};          // { "cardIdx_lang": translatedText }
  try { cache = JSON.parse(localStorage.getItem(XLAT_KEY) || '{}'); } catch {}
  let _xlatSaveT = null;
  function saveXlatCache() {
    clearTimeout(_xlatSaveT);
    _xlatSaveT = setTimeout(() => {
      try { localStorage.setItem(XLAT_KEY, JSON.stringify(cache)); }
      catch { try { localStorage.removeItem(XLAT_KEY); } catch {} }
    }, 800);
  }
  let translatedNow = false, _translatedLang = null;
  let translationMode = false, _autoXlatTimer = null;

  // Pre-select the opposite of book language
  $('target-lang').value = BOOK_LANG === 'pt' ? 'en' : 'pt';
  if (!$('target-lang').value) $('target-lang').value = 'pt';

  async function fetchTranslation(text, from, to) {
    try {
      const url = new URL('https://translate.googleapis.com/translate_a/single');
      url.searchParams.set('client', 'gtx');
      url.searchParams.set('sl', from === 'unknown' ? 'auto' : from);
      url.searchParams.set('tl', to);
      url.searchParams.set('dt', 't');
      url.searchParams.set('q',  text);
      const data = await (await fetch(url, {signal: AbortSignal.timeout(8000)})).json();
      return data[0].map(c => c[0]||'').join('');
    } catch {}

    try {
      const src = from === 'unknown' ? 'autodetect' : from;
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${to}`;
      const data = await (await fetch(url, {signal: AbortSignal.timeout(8000)})).json();
      if (data.responseStatus === 200) return data.responseData.translatedText;
    } catch {}

    throw new Error('Tradução indisponível.');
  }

  function applyTranslation(text, toIso) {
    const inner = front.querySelector('.card-inner');
    if (!inner) return;
    // \n{2,} = parágrafo real; \n simples é quebra que o Google insere em frases longas
    inner.innerHTML = text.split(/\n{2,}/).filter(l => l.trim())
      .map(l => `<p>${l.replace(/\n/g, ' ')}</p>`).join('');
    translatedNow = true;
    _translatedLang = ISO_TO_BCP47[toIso] || ISO_TO_BCP47[toIso.split('-')[0]] || toIso;
    syncTTSFromISO(toIso);   // seletor de voz acompanha o idioma da tradução
    $('btn-xlat').classList.add('active');
    const badge = $('xlat-badge');
    const fromLabel = BOOK_LANG !== 'unknown' ? BOOK_LANG.toUpperCase() : 'AUTO';
    badge.textContent = `${fromLabel} → ${toIso.split('-')[0].toUpperCase()}`;
    badge.hidden = false;
    if (ttsActive) { cancelCurrent(); setTimeout(ttsSpeak, 60); }
  }

  function revertTranslation() {
    renderCard(front, CARDS[current]);
    translatedNow = false; _translatedLang = null;
    $('btn-xlat').classList.remove('active');
    $('xlat-badge').hidden = true;
    if (ttsActive) { cancelCurrent(); setTimeout(ttsSpeak, 60); }
  }

  async function translateCard(idx) {
    const to       = $('target-lang').value;
    const fromBase = BOOK_LANG !== 'unknown' ? BOOK_LANG.split('-')[0] : null;
    const toBase   = to.split('-')[0];

    // Same-language guard
    if (fromBase && fromBase === toBase) {
      showToast(`O livro já está em ${LANG_NAMES[fromBase] || fromBase}`);
      return false;
    }

    const text = cardTextForXlat(idx);
    if (!text) return false;

    const cacheKey = `${idx}_${to}`;
    if (cache[cacheKey]) { applyTranslation(cache[cacheKey], to); preFetchTranslations(idx); return true; }

    // Feedback no próprio card: pulso suave enquanto traduz
    const inner = front.querySelector('.card-inner');
    if (inner) inner.classList.add('xlat-loading');
    try {
      const from   = BOOK_LANG === 'unknown' ? 'auto' : BOOK_LANG;
      const result = await fetchTranslation(text, from, to);
      cache[cacheKey] = result;
      saveXlatCache();
      if (idx !== current) return false;   // usuário já virou a página
      applyTranslation(result, to);
      preFetchTranslations(idx);
      return true;
    } catch {
      showToast('A tradução falhou. Tente de novo.');
      return false;
    } finally {
      if (inner) inner.classList.remove('xlat-loading');
    }
  }

  function preFetchTranslations(fromIdx) {
    const to   = $('target-lang').value;
    const from = BOOK_LANG === 'unknown' ? 'auto' : BOOK_LANG;
    for (let i = 1; i <= 4; i++) {
      const idx = fromIdx + i;
      if (idx >= TOTAL) break;
      const cacheKey = `${idx}_${to}`;
      if (cache[cacheKey]) continue;
      const text = cardTextForXlat(idx);
      if (!text) continue;
      fetchTranslation(text, from, to)
        .then(r => { if (r) { cache[cacheKey] = r; saveXlatCache(); } })
        .catch(() => {});
    }
  }

  $('btn-xlat').addEventListener('click', () => {
    if (translationMode) {
      translationMode = false;
      clearTimeout(_autoXlatTimer);
      revertTranslation();
    } else {
      translationMode = true;
      $('btn-xlat').classList.add('active');
      translateCard(current);
    }
  });

  // Sincronia bidirecional: tradução ↔ TTS usam sempre o mesmo idioma
  function syncTTSFromISO(iso) {
    const bcp47 = ISO_TO_BCP47[iso] || ISO_TO_BCP47[iso.split('-')[0]];
    if (bcp47) $('tts-lang-sel').value = bcp47;
  }
  function syncTranslationFromBCP47(bcp47) {
    const sel = $('target-lang');
    const iso = bcp47.split('-')[0].toLowerCase();
    if (sel.querySelector(`option[value="${iso}"]`)) sel.value = iso;
    else if (sel.querySelector(`option[value="${bcp47}"]`)) sel.value = bcp47;
  }

  // Trocar idioma de tradução → sincroniza voz (e re-traduz se ativo)
  $('target-lang').addEventListener('change', () => {
    _ttsPre.clear();
    syncTTSFromISO($('target-lang').value);
    if (translatedNow || translationMode) {
      clearTimeout(_autoXlatTimer);
      translatedNow = false; _translatedLang = null;
      translateCard(current);
    }
  });

  // Trocar idioma da voz → sincroniza tradução (e re-traduz/re-narra se ativo)
  $('tts-lang-sel').addEventListener('change', e => {
    _ttsPre.clear();
    syncTranslationFromBCP47(e.target.value);
    if (translatedNow || translationMode) {
      clearTimeout(_autoXlatTimer);
      translatedNow = false; _translatedLang = null;
      translateCard(current);
    } else if (ttsActive && !ttsPaused) {
      cancelCurrent(); setTimeout(ttsSpeak, 60);
    }
  });

  // ── Service worker (leitura offline + cache de áudio) ────────────
  if ('serviceWorker' in navigator)
    navigator.serviceWorker.register('/sw.js').catch(() => {});

})();
</script>
</body>
</html>
