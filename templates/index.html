<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="f9 reader — Leia EPUB e PDF em qualquer tela">
  <title>f9 reader</title>
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" content="#F7F2E8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1C1814" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    // Aplica o tema antes de renderizar para evitar flash
    (function () {
      var d = localStorage.getItem('readerDark');
      if (d === '1' || (d === null && matchMedia('(prefers-color-scheme:dark)').matches))
        document.documentElement.classList.add('dark');
    })();
  </script>
  <style>
    :root {
      --bg:       #F7F2E8;
      --bg2:      #EDE7D9;
      --bg3:      #E2D9C9;
      --text:     #2B1D10;
      --muted:    #7A6858;
      --border:   #D4C9B8;
      --accent:   #9B6A2F;
      --accent-h: #7A521F;
      --accent2:  #C8956C;
      --error:    #C0392B;
    }
    .dark {
      --bg:       #1C1814;
      --bg2:      #252118;
      --bg3:      #2E2820;
      --text:     #E8DCC8;
      --muted:    #9A8C7A;
      --border:   #3A342C;
      --accent:   #C8956C;
      --accent-h: #E0AA80;
      --accent2:  #E0AA80;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      transition: background .3s, color .3s;
    }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px 48px;
    }
    main {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Brand ─────────────────────────────────────────── */
    .brand {
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-bottom: 8px;
      user-select: none;
    }
    .b-f9 {
      font-family: 'Inter', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.06em;
      color: var(--accent);
      line-height: 1;
    }
    .b-reader {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.8rem;
      font-weight: 400;
      font-style: italic;
      color: var(--text);
      line-height: 1;
    }
    .tagline {
      color: var(--muted);
      font-size: 0.87rem;
      margin-bottom: 44px;
      text-align: center;
    }

    /* ── Drop zone ─────────────────────────────────────── */
    .drop-zone {
      background: var(--bg2);
      border: 2px dashed var(--border);
      border-radius: 20px;
      width: 100%;
      padding: 40px 28px;
      text-align: center;
      transition: border-color .2s, background .3s;
      cursor: pointer;
    }
    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--bg3);
    }
    .drop-icon {
      font-size: 2.6rem;
      margin-bottom: 14px;
      display: block;
      pointer-events: none;
    }
    .drop-zone h2 {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    .drop-zone > p {
      color: var(--muted);
      font-size: 0.87rem;
      line-height: 1.5;
      margin-bottom: 22px;
    }
    .badge-row {
      display: flex;
      gap: 7px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .badge {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .file-input-wrapper {
      position: relative;
    }
    .btn-upload {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      padding: 13px 28px;
      cursor: pointer;
      transition: background .15s, transform .1s;
      width: 100%;
      position: relative;
      z-index: 2;
    }
    .btn-upload:hover { background: var(--accent-h); }
    .btn-upload:active { transform: scale(0.98); }
    input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      z-index: 1;
      width: 100%;
      height: 100%;
    }
    .error-msg {
      margin-top: 14px;
      color: var(--error);
      font-size: 0.87rem;
      background: rgba(192,57,43,0.08);
      border-radius: 8px;
      padding: 10px 14px;
    }

    /* ── Recent books ──────────────────────────────────── */
    .recent-section {
      width: 100%;
      margin-top: 32px;
    }
    .recent-header {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    .recent-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .recent-list li {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .recent-item {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      background: var(--bg2);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      transition: border-color .15s, background .15s;
      min-width: 0;
    }
    .recent-item:hover {
      border-color: var(--accent);
      background: var(--bg3);
    }
    .recent-cover {
      width: 36px;
      height: 50px;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lora', Georgia, serif;
      font-weight: 600;
      font-size: 0.78rem;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,.3);
      user-select: none;
    }
    .recent-item-info {
      flex: 1;
      min-width: 0;
    }
    .recent-item-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }
    .progress-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .progress-mini {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-mini-fill {
      height: 100%;
      background: var(--accent2);
      border-radius: 2px;
    }
    .progress-pct {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      min-width: 30px;
      text-align: right;
      white-space: nowrap;
    }
    .recent-arrow {
      font-size: 0.95rem;
      color: var(--accent);
      flex-shrink: 0;
    }
    .btn-del {
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      transition: background .15s, color .15s;
    }
    .btn-del:hover { background: rgba(192,57,43,.12); color: #c0392b; }

    /* ── Loading overlay ───────────────────────────────── */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(247,242,232,0.92);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      backdrop-filter: blur(4px);
    }
    .dark .loading-overlay { background: rgba(28,24,20,0.92); }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .loading-text {
      font-family: 'Lora', serif;
      color: var(--muted);
      font-size: .95rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loading" aria-live="polite">
    <div class="spinner"></div>
    <p class="loading-text">Preparando sua leitura…</p>
  </div>

  <main>
    <header style="text-align:center">
      <div class="brand" aria-label="f9 reader">
        <span class="b-f9">f9</span><span class="b-reader">reader</span>
      </div>
      <p class="tagline">Leia EPUB e PDF em qualquer tela</p>
    </header>

    <div class="drop-zone" id="drop-zone" role="region" aria-label="Upload de livro">
      <span class="drop-icon" aria-hidden="true">📚</span>
      <h2>Abrir um livro</h2>
      <p>Arraste o arquivo aqui ou clique para escolher</p>
      <div class="badge-row" aria-hidden="true">
        <span class="badge">EPUB</span>
        <span class="badge">PDF</span>
      </div>
      <form method="POST" action="/upload" enctype="multipart/form-data" id="upload-form">
        <div class="file-input-wrapper">
          <button type="button" class="btn-upload">Escolher arquivo</button>
          <input type="file" name="file" id="file-input" accept=".epub,.pdf"
                 aria-label="Selecionar arquivo EPUB ou PDF">
        </div>
      </form>
      {% if error %}
      <div class="error-msg" role="alert">{{ error }}</div>
      {% endif %}
    </div>

    <section class="recent-section" id="recent-section" style="display:none"
             aria-label="Lidos recentemente">
      <h2 class="recent-header">Lidos recentemente</h2>
      <ul class="recent-list" id="recent-list"></ul>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById('file-input');
    const form      = document.getElementById('upload-form');
    const dropZone  = document.getElementById('drop-zone');
    const loading   = document.getElementById('loading');

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) { loading.classList.add('active'); form.submit(); }
    });

    // Click anywhere on the card opens the file dialog
    dropZone.addEventListener('click', e => {
      if (!e.target.closest('.file-input-wrapper') && !e.target.closest('.error-msg')) {
        fileInput.click();
      }
    });

    // Drag-and-drop
    ['dragenter', 'dragover'].forEach(ev =>
      dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('drag-over'); })
    );
    ['dragleave', 'drop'].forEach(ev =>
      dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('drag-over'); })
    );
    dropZone.addEventListener('drop', e => {
      const file = e.dataTransfer.files[0];
      if (!file) return;
      if (!['epub', 'pdf'].includes(file.name.split('.').pop().toLowerCase())) return;
      const dt = new DataTransfer();
      dt.items.add(file);
      fileInput.files = dt.files;
      loading.classList.add('active');
      form.submit();
    });

    function getCookie(name) {
      const m = document.cookie.match(
        new RegExp('(?:^|; )' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)')
      );
      return m ? decodeURIComponent(m[1]) : null;
    }

    // Capa gerada: iniciais do título sobre gradiente estável (hash do título)
    const COVER_GRADS = [
      ['#9B6A2F','#C8956C'], ['#6B4A8E','#9B7BC4'], ['#2F6B4F','#5FA882'],
      ['#8E3A3A','#C46B6B'], ['#2F5B8E','#6B9BC4'], ['#7A6224','#B39A54'],
    ];
    function coverStyle(title) {
      let h = 0;
      for (const ch of title) h = (h * 31 + ch.codePointAt(0)) >>> 0;
      const [a, b] = COVER_GRADS[h % COVER_GRADS.length];
      return `background:linear-gradient(135deg,${a},${b})`;
    }
    function coverInitials(title) {
      const w = title.trim().split(/\s+/).filter(x => /[\p{L}\p{N}]/u.test(x));
      return ((w[0]?.[0] || '?') + (w[1]?.[0] || '')).toUpperCase();
    }

    function loadRecent() {
      let recent;
      try { recent = JSON.parse(localStorage.getItem('recentBooks') || '[]'); }
      catch { return; }
      if (!recent.length) return;

      const section = document.getElementById('recent-section');
      const list    = document.getElementById('recent-list');
      section.style.display = 'block';

      recent.slice(0, 6).forEach(book => {
        const raw = getCookie('card_' + book.id);
        const pos = raw !== null ? parseInt(raw, 10) : null;
        const tot = book.total || null;

        // Percentual real: (cards lidos) / total, mínimo 1% quando iniciado
        const pct = (pos !== null && tot)
          ? Math.max(1, Math.min(100, Math.round((pos + 1) / tot * 100)))
          : null;

        const pctLabel = pct !== null ? pct + '%' : (pos !== null ? '—' : 'Começar');
        const barWidth = pct !== null ? pct : 0;

        const li = document.createElement('li');
        li.dataset.id = book.id;
        li.innerHTML =
          `<a class="recent-item" href="/reader/${esc(book.id)}">
            <div class="recent-cover" style="${coverStyle(book.title || '')}" aria-hidden="true">${esc(coverInitials(book.title || '?'))}</div>
            <div class="recent-item-info">
              <div class="recent-item-title">${esc(book.title || 'Sem título')}</div>
              <div class="progress-row">
                <div class="progress-mini">
                  <div class="progress-mini-fill" style="width:${barWidth}%"></div>
                </div>
                <span class="progress-pct">${pctLabel}</span>
              </div>
            </div>
            <span class="recent-arrow" aria-hidden="true">→</span>
          </a>
          <button class="btn-del" title="Remover da lista"
                  aria-label="Remover ${esc(book.title || '')}">✕</button>`;

        li.querySelector('.btn-del').addEventListener('click', async () => {
          try { await fetch('/delete/' + book.id, { method: 'POST' }); } catch {}
          let r = JSON.parse(localStorage.getItem('recentBooks') || '[]');
          r = r.filter(b => b.id !== book.id);
          localStorage.setItem('recentBooks', JSON.stringify(r));
          li.remove();
          if (!list.children.length) section.style.display = 'none';
        });

        list.appendChild(li);
      });
    }

    loadRecent();

    if ('serviceWorker' in navigator)
      navigator.serviceWorker.register('/sw.js').catch(() => {});
  </script>
</body>
</html>
